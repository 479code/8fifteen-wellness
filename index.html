<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>8fifteen Wellness</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bodoni+Moda:opsz,wght@6..96,400;6..96,600;6..96,700&family=Archivo:wght@700;900&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap');

/* ─── Tokens ─── */
:root{
  --ink:#1A1814; --bg:#F1EBDD; --surface:#F8F4EA; --paper:#FFFFFF;
  --line:#E2DAC6; --muted:#8A8170;
  --accent:#9C7A3C; --accent-ink:#FFF; --accent-dark:#7E632F; --accent-bg:#F1E6CE;
  --success:#3E6B4A; --success-bg:#E3EAE1;
  --warn:#8A6A2E; --warn-bg:#F2E6C9;
  --danger:#9B4B3A; --danger-bg:#F3DFD8;
  --nav-bg:#131210; --nav-txt:#EFE9DA; --nav-muted:#948C7A;
  --nav-act:#C9A766; --nav-act-ink:#131210;
  --shadow:0 2px 12px rgba(20,18,12,.08);
  --shadow-lg:0 8px 32px rgba(20,18,12,.14);
  --r:12px; --r-sm:8px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --safe-top: env(safe-area-inset-top, 0px);
}
body.dark{
  --ink:#F1ECE0; --bg:#0E0D0B; --surface:#141310; --paper:#1B1916;
  --line:#2E2920; --muted:#A39A86;
  --accent:#C9A766; --accent-ink:#15130F; --accent-dark:#DCC084; --accent-bg:#2B2415;
  --success:#7FAE8B; --success-bg:#1C2620;
  --warn:#D8B567; --warn-bg:#2E2615;
  --danger:#D08A78; --danger-bg:#2E1C18;
  --shadow:0 2px 12px rgba(0,0,0,.3); --shadow-lg:0 8px 32px rgba(0,0,0,.4);
}

/* ─── Reset ─── */
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{height:100%;font-size:16px;}
body{margin:0;font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--ink);height:100%;
  transition:background .2s,color .2s;-webkit-font-smoothing:antialiased;}
button,input,select,textarea{font-family:inherit;font-size:inherit;}
button{cursor:pointer;}
img,svg{display:block;}

/* ─── Animations ─── */
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes scaleIn{from{opacity:0;transform:scale(.94)}to{opacity:1;transform:scale(1)}}
@keyframes sheetUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(12px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}
@keyframes lmDraw{to{stroke-dashoffset:0}}
@keyframes lmSpin{to{transform:rotate(360deg)}}
@keyframes lmFade{to{opacity:.45}}
@keyframes lmPop{to{opacity:1;transform:scale(1)}}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.001ms!important;animation-iteration-count:1!important;transition-duration:.001ms!important}}

/* ─── Layout shell ─── */
#app{display:flex;height:100%;height:100dvh;overflow:hidden;position:relative;}

/* ─── Sidebar (desktop) ─── */
.sidebar{
  width:240px;flex-shrink:0;background:var(--nav-bg);color:var(--nav-txt);
  display:flex;flex-direction:column;padding:22px 16px 18px;
  transition:transform .28s cubic-bezier(.4,0,.2,1);z-index:300;
}
.brand-mark{display:flex;justify-content:center;color:var(--nav-txt);margin-bottom:12px;}
.brand-word{font-family:'Archivo',sans-serif;font-weight:900;font-size:18px;letter-spacing:.15em;text-align:center;color:var(--nav-txt);}
.brand-sub{font-size:9px;letter-spacing:.22em;text-align:center;color:var(--nav-muted);margin:4px 0 22px;text-transform:uppercase;}
.nav-list{display:flex;flex-direction:column;gap:2px;}
.nav-btn{display:flex;align-items:center;gap:10px;width:100%;padding:10px 12px;border-radius:var(--r-sm);border:none;background:transparent;color:var(--nav-muted);font-size:13.5px;text-align:left;transition:background .15s,color .15s,transform .1s;}
.nav-btn:hover{background:rgba(239,233,218,.07);color:var(--nav-txt);}
.nav-btn.active{background:var(--nav-act);color:var(--nav-act-ink);font-weight:700;}
.nav-btn:active{transform:scale(.97);}
.nav-btn svg{flex-shrink:0;}
.sidebar-foot{margin-top:auto;padding-top:14px;border-top:1px solid rgba(239,233,218,.1);font-size:10px;color:var(--nav-muted);line-height:1.7;}

/* ─── Main area ─── */
.main{flex:1;min-width:0;display:flex;flex-direction:column;background:var(--surface);overflow:hidden;}
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 24px;border-bottom:1px solid var(--line);
  background:var(--surface);flex-shrink:0;
}
.topbar-left{display:flex;align-items:center;gap:12px;min-width:0;}
.topbar h1{font-family:'Bodoni Moda',serif;font-size:20px;font-weight:600;margin:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.topbar-sub{font-size:11.5px;color:var(--muted);margin-top:2px;display:flex;align-items:center;gap:6px;}
.topbar-actions{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.role-toggle{display:flex;border:1px solid var(--line);border-radius:999px;overflow:hidden;background:var(--paper);}
.role-toggle button{padding:6px 14px;border:none;background:transparent;color:var(--muted);font-size:12px;font-weight:600;}
.role-toggle button.active{background:var(--ink);color:var(--surface);}
.icon-action{width:34px;height:34px;border-radius:999px;border:1px solid var(--line);background:var(--paper);display:flex;align-items:center;justify-content:center;color:var(--ink);}
.icon-action:hover{border-color:var(--ink);}
.hamburger{display:none;}

/* ─── Content scroll ─── */
.content{flex:1;overflow-y:auto;padding:20px 24px;-webkit-overflow-scrolling:touch;}
.view-enter{animation:fadeUp .32s ease both;}

/* ─── Stat grids ─── */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px;}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px;}
.stat-card{background:var(--paper);border:1px solid var(--line);border-radius:var(--r);padding:15px;box-shadow:var(--shadow);animation:fadeUp .4s ease both;}
.stat-top{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.stat-icon{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;color:#fff;flex-shrink:0;}
.stat-label{font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;font-weight:600;}
.stat-value{font-family:'Bodoni Moda',serif;font-size:22px;font-weight:600;line-height:1.1;}
.stat-sub{font-size:11px;color:var(--muted);margin-top:3px;}

/* ─── Panel ─── */
.panel{background:var(--paper);border:1px solid var(--line);border-radius:var(--r);margin-bottom:14px;box-shadow:var(--shadow);overflow:hidden;animation:fadeUp .38s ease both;}
.panel-head{padding:13px 17px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;}
.panel-head h3{margin:0;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);}
.two-col{display:grid;grid-template-columns:1.3fr 1fr;gap:14px;}

/* ─── Tables ─── */
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}
table{width:100%;border-collapse:collapse;font-size:12.5px;}
th{font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);font-weight:700;padding:9px 16px;border-bottom:1px solid var(--line);text-align:left;white-space:nowrap;background:var(--paper);}
td{padding:10px 16px;border-bottom:1px solid var(--line);white-space:nowrap;}
tr:last-child td{border-bottom:none;}
tbody tr{transition:background .12s;}
tbody tr:hover td{background:var(--bg);}
.empty-row td{text-align:center;color:var(--muted);padding:28px;white-space:normal;font-size:13px;}

/* ─── Mobile data cards (replaces tables on small screens) ─── */
.data-cards{display:none;}
.data-card{background:var(--paper);border:1px solid var(--line);border-radius:var(--r-sm);padding:14px;margin-bottom:8px;animation:fadeUp .3s ease both;}
.dc-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;}
.dc-row:last-child{margin-bottom:0;}
.dc-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;}
.dc-val{font-size:13px;font-weight:600;}
.dc-title{font-size:14px;font-weight:600;margin-bottom:8px;}
.dc-meta{font-size:11.5px;color:var(--muted);}
.dc-actions{display:flex;gap:7px;margin-top:10px;padding-top:10px;border-top:1px solid var(--line);}
.dc-actions button{flex:1;}

/* ─── Badges ─── */
.badge{font-size:10px;font-weight:700;padding:3px 9px;border-radius:999px;display:inline-block;letter-spacing:.02em;}
.badge-ok{background:var(--success-bg);color:var(--success);}
.badge-low{background:var(--warn-bg);color:var(--warn);}
.badge-out{background:var(--danger-bg);color:var(--danger);animation:pulse 1.8s ease-in-out infinite;}
.badge-pay{background:var(--bg);color:var(--ink);border:1px solid var(--line);}

/* ─── Toolbar ─── */
.toolbar{display:flex;gap:8px;margin-bottom:14px;align-items:center;flex-wrap:wrap;}
.search-box{display:flex;align-items:center;gap:7px;background:var(--paper);border:1px solid var(--line);border-radius:var(--r-sm);padding:8px 12px;flex:1;min-width:0;}
.search-box input{border:none;outline:none;font-size:13px;flex:1;background:transparent;color:var(--ink);min-width:0;}
.chip-row{display:flex;gap:6px;flex-wrap:wrap;}
.chip{padding:7px 14px;border-radius:999px;border:1px solid var(--line);background:var(--paper);font-size:12px;color:var(--muted);font-weight:500;transition:background .14s,color .14s,transform .1s;}
.chip.active{background:var(--ink);color:var(--surface);border-color:var(--ink);font-weight:700;}
.chip:active{transform:scale(.95);}
.date-input{padding:8px 10px;border:1px solid var(--line);border-radius:var(--r-sm);font-size:12.5px;background:var(--paper);color:var(--ink);}

/* ─── Buttons ─── */
.btn{font-size:13px;font-weight:700;padding:9px 16px;border-radius:var(--r-sm);border:none;cursor:pointer;display:inline-flex;align-items:center;gap:6px;white-space:nowrap;letter-spacing:.01em;transition:background .14s,transform .1s;}
.btn-primary{background:var(--accent);color:var(--accent-ink);}
.btn-primary:hover{background:var(--accent-dark);}
.btn-primary:active{transform:scale(.97);}
.btn-primary:disabled{background:var(--line);color:var(--muted);cursor:not-allowed;}
.btn-ghost{background:transparent;border:1px solid var(--line);color:var(--ink);}
.btn-ghost:hover{border-color:var(--ink);}
.btn-ghost:active{transform:scale(.97);}
.btn-sm{padding:6px 11px;font-size:11.5px;border-radius:6px;}
.icon-btn{min-width:32px;height:32px;border-radius:6px;border:1px solid var(--line);background:var(--paper);display:inline-flex;align-items:center;justify-content:center;color:var(--ink);transition:border-color .14s,transform .1s;}
.icon-btn:hover{border-color:var(--ink);}
.icon-btn:active{transform:scale(.92);}

/* ─── Sales entry ─── */
.sale-meta{display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:14px;padding:15px 17px;border-bottom:1px solid var(--line);}
.sale-meta .s-label{font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:7px;font-weight:700;}
.pay-chips{display:flex;gap:6px;flex-wrap:wrap;}
.row-select{width:100%;padding:9px 10px;border:1px solid var(--line);border-radius:var(--r-sm);background:var(--paper);color:var(--ink);font-size:13px;}
.row-qty{width:68px;padding:9px 10px;border:1px solid var(--line);border-radius:var(--r-sm);background:var(--paper);color:var(--ink);font-size:13px;text-align:center;}
.row-select:disabled,.row-qty:disabled{opacity:.5;}
.sale-foot{display:flex;align-items:center;justify-content:space-between;padding:15px 17px;gap:10px;flex-wrap:wrap;border-top:1px solid var(--line);}
.sale-total-area{min-width:200px;}
.pl-row{display:flex;justify-content:space-between;padding:8px 0;font-size:13px;border-bottom:1px dashed var(--line);}
.pl-row.total{border:none;border-top:2px solid var(--ink);padding-top:12px;font-weight:700;margin-top:4px;}
.pl-row .neg{color:var(--danger);}
.pl-row.sub .plabel{color:var(--muted);padding-left:14px;}
.pl-block{padding:17px;}

/* ─── Category / accounting ─── */
.cat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:14px;}
.cat-card{background:var(--paper);border:1px solid var(--line);border-radius:var(--r);padding:15px;box-shadow:var(--shadow);animation:fadeUp .38s ease both;}
.cat-card h4{margin:0 0 10px;font-size:13.5px;font-weight:700;display:flex;align-items:center;justify-content:space-between;}
.cat-card .crow{display:flex;justify-content:space-between;font-size:12px;padding:4px 0;color:var(--muted);}
.cat-card .crow b{color:var(--ink);font-weight:600;}
.cat-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px;}
.bar-row{display:flex;align-items:center;gap:10px;padding:8px 0;}
.bar-lbl{font-size:12px;width:110px;flex-shrink:0;}
.bar-track{flex:1;height:8px;background:var(--bg);border-radius:999px;overflow:hidden;}
.bar-fill{height:100%;border-radius:999px;transition:width .6s ease;}
.bar-val{font-size:11px;width:84px;text-align:right;flex-shrink:0;color:var(--muted);}

/* ─── Role pill ─── */
.role-pill{font-size:10px;font-weight:700;padding:2px 9px;border-radius:999px;text-transform:uppercase;letter-spacing:.04em;}
.role-pill.admin{background:var(--success-bg);color:var(--success);}
.role-pill.staff{background:var(--warn-bg);color:var(--warn);}

/* ─── Toast ─── */
.toast{position:fixed;bottom:calc(70px + var(--safe-bottom));left:50%;transform:translateX(-50%);
  background:var(--nav-bg);color:var(--nav-txt);padding:11px 18px;border-radius:999px;
  font-size:13px;display:flex;align-items:center;gap:8px;box-shadow:var(--shadow-lg);
  white-space:nowrap;z-index:600;animation:toastIn .25s ease both;}

/* ─── Modal / Bottom sheet ─── */
.overlay{position:fixed;inset:0;background:rgba(12,10,7,.55);z-index:400;animation:fadeIn .18s ease both;}
.sheet{
  position:fixed;bottom:0;left:0;right:0;
  background:var(--paper);border-radius:20px 20px 0 0;
  max-height:92dvh;overflow-y:auto;
  z-index:500;animation:sheetUp .28s cubic-bezier(.32,0,.67,0) both;
  padding-bottom:calc(20px + var(--safe-bottom));
}
.sheet-handle{width:40px;height:4px;background:var(--line);border-radius:999px;margin:14px auto 0;}
.sheet-head{padding:14px 20px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--line);}
.sheet-head h3{margin:0;font-size:16px;font-weight:600;font-family:'Bodoni Moda',serif;}
.sheet-body{padding:18px 20px;}
.sheet-foot{padding:12px 20px;border-top:1px solid var(--line);display:flex;gap:9px;justify-content:flex-end;}
.field{margin-bottom:13px;}
.field label{display:block;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px;font-weight:700;}
.field input,.field select{width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:var(--r-sm);font-size:14px;background:var(--surface);color:var(--ink);}
.field input:focus,.field select:focus{outline:2px solid var(--accent);border-color:var(--accent);}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.margin-preview{background:var(--accent-bg);border-radius:var(--r-sm);padding:11px 13px;font-size:12px;color:var(--muted);display:flex;justify-content:space-between;margin-bottom:14px;}
.margin-preview b{color:var(--accent-dark);font-family:'IBM Plex Mono',monospace;}
body.dark .margin-preview b{color:var(--accent);}

/* ─── Logo animation classes ─── */
.lm-draw{animation:lmDraw 1.6s ease forwards;}
.lm-draw2{animation:lmDraw 1.6s .25s ease forwards;}
.lm-rotate{transform-box:view-box;transform-origin:60px 60px;animation:lmSpin 56s linear infinite;}
.lm-divider{opacity:0;animation:lmFade .8s 1.3s ease forwards;}
.lm-center{opacity:0;transform:scale(.84);transform-box:view-box;transform-origin:60px 60px;animation:lmPop .55s 1.1s cubic-bezier(.34,1.56,.64,1) forwards;}

/* ─── Bottom tab bar (mobile) ─── */
.bottom-nav{display:none;}

/* ─── Backdrop for drawer ─── */
.drawer-backdrop{position:fixed;inset:0;background:rgba(12,10,7,.5);z-index:290;opacity:0;pointer-events:none;transition:opacity .22s ease;}
.drawer-backdrop.show{opacity:1;pointer-events:auto;}
.sidebar-close-btn{display:none;}

/* ════════════════════════════════════════════
   RESPONSIVE — TABLET  ≤ 960px
═══════════════════════════════════════════════ */
@media(max-width:960px){
  .stat-grid,.kpi-grid{grid-template-columns:repeat(2,1fr);}
  .cat-grid{grid-template-columns:repeat(2,1fr);}
  .two-col{grid-template-columns:1fr;}
}

/* ════════════════════════════════════════════
   RESPONSIVE — MOBILE  ≤ 680px
═══════════════════════════════════════════════ */
@media(max-width:680px){

  /* Hide desktop sidebar, show hamburger */
  .sidebar{
    position:fixed;top:0;left:0;bottom:0;width:82%;max-width:290px;
    transform:translateX(-100%);transition:transform .28s cubic-bezier(.4,0,.2,1);
    z-index:300;padding-top:calc(22px + var(--safe-top));
    padding-bottom:calc(18px + var(--safe-bottom));
  }
  .sidebar.open{transform:translateX(0);}
  .hamburger{display:flex;}
  .sidebar-close-btn{
    display:flex;position:absolute;top:calc(16px + var(--safe-top));right:14px;
    width:32px;height:32px;border-radius:7px;border:1px solid rgba(239,233,218,.15);
    background:transparent;color:var(--nav-txt);align-items:center;justify-content:center;
  }

  /* Topbar */
  .topbar{padding:12px 16px;padding-top:calc(12px + var(--safe-top));}
  .topbar h1{font-size:17px;}
  .topbar-sub{display:none;}
  .role-toggle{display:none;}

  /* Content */
  .content{padding:14px 14px calc(80px + var(--safe-bottom));scroll-padding-bottom:80px;}

  /* Stats */
  .stat-grid,.kpi-grid{grid-template-columns:repeat(2,1fr);gap:9px;}
  .cat-grid{grid-template-columns:1fr 1fr;gap:9px;}
  .stat-card,.cat-card{padding:12px;}
  .stat-value{font-size:19px;}
  .two-col{grid-template-columns:1fr;}

  /* Tables → cards */
  .table-wrap table{display:none;}
  .data-cards{display:block;}

  /* Toolbar */
  .toolbar{flex-direction:column;gap:8px;}
  .search-box{max-width:none;}
  .chip-row{width:100%;overflow-x:auto;flex-wrap:nowrap;padding-bottom:2px;
    scrollbar-width:none;-ms-overflow-style:none;}
  .chip-row::-webkit-scrollbar{display:none;}
  .chip{flex-shrink:0;}

  /* Sales */
  .sale-meta{flex-direction:column;gap:12px;}
  .sale-foot{flex-direction:column;gap:10px;}
  .sale-foot .btn{width:100%;justify-content:center;padding:13px 16px;font-size:14px;}
  .sale-total-area{width:100%;}
  .row-select{font-size:14px;padding:11px 10px;}
  .row-qty{width:74px;font-size:14px;padding:11px 10px;}
  td.row-actions{white-space:nowrap;}

  /* Bottom nav bar */
  .bottom-nav{
    display:flex;position:fixed;bottom:0;left:0;right:0;
    background:var(--nav-bg);
    padding:8px 0 calc(8px + var(--safe-bottom));
    border-top:1px solid rgba(239,233,218,.1);z-index:200;
  }
  .bnav-btn{
    flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
    padding:4px 2px;border:none;background:transparent;color:var(--nav-muted);
    font-size:10px;font-weight:600;letter-spacing:.03em;transition:color .15s;
  }
  .bnav-btn.active{color:var(--nav-act);}
  .bnav-btn svg{width:22px;height:22px;}
  .bnav-more-dot{width:5px;height:5px;border-radius:50%;background:var(--nav-muted);margin:7px auto 0;}
  .bnav-btn.active .bnav-more-dot{background:var(--nav-act);}

  /* Modals become full bottom sheet */
  .sheet{border-radius:24px 24px 0 0;}
  .field-row{grid-template-columns:1fr;}
  .field input,.field select{font-size:16px;padding:13px 12px;}/* prevents iOS zoom */
  .sheet-foot .btn{flex:1;justify-content:center;padding:13px;}

  /* Toast above bottom nav */
  .toast{bottom:calc(80px + var(--safe-bottom));}

  /* More menu sheet */
  .more-nav-item{
    display:flex;align-items:center;gap:14px;width:100%;padding:15px 20px;
    border:none;background:transparent;color:var(--ink);font-size:15px;font-weight:500;
    border-bottom:1px solid var(--line);text-align:left;transition:background .12s;
  }
  .more-nav-item:last-child{border-bottom:none;}
  .more-nav-item:active{background:var(--bg);}

/* ── Google Sheets API Layer ── */
let GAS_URL = localStorage.getItem('8fw_gas_url') || '';
let DB_STATE = 'offline'; // 'offline' | 'loading' | 'live' | 'error'
let SYNC_PENDING = 0;

async function loadFromSheets() {
  if (!GAS_URL) { DB_STATE='offline'; renderSyncBadge(); return; }
  DB_STATE='loading'; renderSyncBadge();
  try {
    const r = await fetch(`${GAS_URL}?action=getAllData`);
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const d = await r.json();
    if (!d.ok) throw new Error(d.error || 'Server error');
    if (d.products && d.products.length) products = d.products;
    if (d.sales && d.sales.length) sales = d.sales;
    if (d.expenses && d.expenses.length) expenses = d.expenses;
    if (d.users && d.users.length) users = d.users;
    DB_STATE='live'; renderSyncBadge(); renderContent();
  } catch(e) {
    DB_STATE='error'; renderSyncBadge();
    console.warn('Sheets load error:', e.message);
  }
}

async function sheetPost(action, data) {
  if (!GAS_URL) return;
  SYNC_PENDING++; renderSyncBadge();
  try {
    const body = new URLSearchParams({action, data: JSON.stringify(data)});
    const r = await fetch(GAS_URL, {method:'POST', body});
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const d = await r.json();
    if (!d.ok) throw new Error(d.error || 'Write error');
    DB_STATE='live';
  } catch(e) {
    DB_STATE='error';
    console.warn('Sheets write error:', e.message);
  } finally {
    SYNC_PENDING = Math.max(0, SYNC_PENDING-1);
    renderSyncBadge();
  }
}

function renderSyncBadge() {
  const el = document.getElementById('sync-badge');
  if (!el) return;
  const badges = {
    offline: `<span id="sync-badge" style="font-size:11px;color:var(--muted);display:flex;align-items:center;gap:4px">${icon('link',11)} Offline</span>`,
    loading: `<span id="sync-badge" style="font-size:11px;color:var(--accent);display:flex;align-items:center;gap:4px">${icon('wifi',11)} Connecting…</span>`,
    live:    `<span id="sync-badge" style="font-size:11px;color:var(--success);display:flex;align-items:center;gap:4px">${icon('wifi',11)} ${SYNC_PENDING>0?'Syncing…':'Live'}</span>`,
    error:   `<span id="sync-badge" style="font-size:11px;color:var(--danger);display:flex;align-items:center;gap:4px">${icon('alert',11)} Sync error</span>`,
  };
  el.outerHTML = badges[DB_STATE] || badges.offline;
}

function tryLogin(email, pw){
  // Also check against Users list for staff (password is staff123 by default, or set via change password)
  const cred = CREDS.find(c=>c.email.toLowerCase()===email.toLowerCase().trim() && c.password===pw);
  if(cred) return {name:cred.name, email:cred.email, role:cred.role};
  // Check dynamic users list (staff added via Users panel use password "staff123" until changed)
  const u = users.find(u=>u.email.toLowerCase()===email.toLowerCase().trim() && u.role==="Staff");
  if(u && pw==="staff123") return {name:u.name, email:u.email, role:u.role};
  return null;
}

  S.loggedIn=true; S.currentUser=user;

function changePassword(){
  const cur  = (document.getElementById("cp-current").value||"").trim();
  const nw   = (document.getElementById("cp-new").value||"").trim();
  const conf = (document.getElementById("cp-confirm").value||"").trim();
  const msgEl = document.getElementById("cp-msg");
  if(!cur||!nw||!conf){ if(msgEl) msgEl.innerHTML=`<span style="color:var(--danger)">All fields are required.</span>`; return; }
  const cred = CREDS.find(c=>c.email===S.currentUser?.email);
  if(!cred||cred.password!==cur){ if(msgEl) msgEl.innerHTML=`<span style="color:var(--danger)">Current password is incorrect.</span>`; return; }
  if(nw.length<8){ if(msgEl) msgEl.innerHTML=`<span style="color:var(--danger)">New password must be at least 8 characters.</span>`; return; }
  if(nw!==conf){ if(msgEl) msgEl.innerHTML=`<span style="color:var(--danger)">New passwords do not match.</span>`; return; }
  cred.password=nw;
  if(msgEl) msgEl.innerHTML=`<span style="color:var(--success)">Password updated successfully.</span>`;
  document.getElementById("cp-current").value="";
  document.getElementById("cp-new").value="";
  document.getElementById("cp-confirm").value="";
}

/* ── Aggregates ── */
const low=()=>products.filter(p=>p.stock<=p.low);
const stockUnits=()=>products.reduce((s,p)=>s+p.stock,0);
const costVal=()=>products.reduce((s,p)=>s+p.stock*p.cost,0);
const retailVal=()=>products.reduce((s,p)=>s+p.stock*p.price,0);
const salesOn=d=>sales.filter(s=>s.date===d);
const sumS=list=>list.reduce((a,s)=>({revenue:a.revenue+s.total,cost:a.cost+s.cost,profit:a.profit+s.profit,items:a.items+s.items.reduce((x,l)=>x+l.qty,0)}),{revenue:0,cost:0,profit:0,items:0});
const totExp=()=>expenses.reduce((s,e)=>s+e.amount,0);
function catStats(){
  return CATS.map(cat=>{
    const pp=products.filter(p=>p.category===cat);
    const su=pp.reduce((s,p)=>s+p.stock,0),sc=pp.reduce((s,p)=>s+p.stock*p.cost,0),sr=pp.reduce((s,p)=>s+p.stock*p.price,0);
    let us=0,rev=0,cst=0;
    sales.forEach(s=>s.items.forEach(l=>{if(l.category===cat){us+=l.qty;rev+=l.price*l.qty;cst+=l.cost*l.qty;}}));
    return{cat,count:pp.length,su,sc,sr,us,rev,cst,profit:rev-cst,margin:rev?(rev-cst)/rev*100:0};
  });
}
function topProds(n){
  const m={};
  sales.forEach(s=>s.items.forEach(l=>{if(!m[l.productId])m[l.productId]={name:l.name,qty:0,rev:0};m[l.productId].qty+=l.qty;m[l.productId].rev+=l.price*l.qty;}));
  return Object.values(m).sort((a,b)=>b.rev-a.rev).slice(0,n||5);
}
function filteredSales(){
  return sales.filter(s=>{
    if(S.histFrom&&s.date<S.histFrom)return false;
    if(S.histTo&&s.date>S.histTo)return false;
    if(S.histCat!=="All"&&!s.items.some(l=>l.category===S.histCat))return false;
    if(S.histSearch&&!s.receipt.toLowerCase().includes(S.histSearch.toLowerCase()))return false;
    return true;
  }).sort((a,b)=>(b.date+b.time).localeCompare(a.date+a.time));
}
function filteredProds(){
  return products.filter(p=>{
    const ok=p.name.toLowerCase().includes(S.invSearch.toLowerCase())||p.sku.toLowerCase().includes(S.invSearch.toLowerCase());
    const oc=S.invCat==="All"||p.category===S.invCat;
    return ok&&oc;
  });
}
function sbadge(p){
  if(p.stock===0)return`<span class="badge badge-out">Out of stock</span>`;
  if(p.stock<=p.low)return`<span class="badge badge-low">Low stock</span>`;
  return`<span class="badge badge-ok">In stock</span>`;
}

let toastTimer=null;
function showToast(msg){
  S.toast=msg;
  const existing=document.getElementById("toast-el");
  if(existing)existing.remove();
  const t=document.createElement("div");
  t.id="toast-el";t.className="toast";
  t.innerHTML=`${icon("check",14)} ${msg}`;
  document.body.appendChild(t);
  if(toastTimer)clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>{const el=document.getElementById("toast-el");if(el)el.remove();},2600);
}

/* ─── Sales Entry ─── */
function validRows(){return S.saleRows.filter(r=>r.productId);}
function renderSales(){
  const rows=S.saleRows;
  let sub=0;

  function buildRow(r,idx){
    const p=products.find(x=>x.id===r.productId);
    const up=p?p.price:0,qty=p?r.qty:0,lt=up*qty;
    if(p){sub+=lt;}
    const srch=(r.search||"").toLowerCase();
    const filtered=r.open?products.filter(px=>px.stock>0&&(px.name.toLowerCase().includes(srch)||px.sku.toLowerCase().includes(srch)||px.category.toLowerCase().includes(srch))).slice(0,8):[];
    const picker = r.productId&&!r.open
      ?`<div class="picker-selected">
          <span class="ps-name">${p.name}</span>
          <span class="ps-price mono">${N(up)}</span>
          <button class="ps-clear" onclick="clearPickerSelection('${r.rowId}')">${icon("x",9)}</button>
        </div>`
      :`<div class="picker-wrap">
          <input id="pk_${r.rowId}" class="picker-input" placeholder="Search by name or SKU…"
            value="${r.search||""}"
            oninput="setPickerSearch('${r.rowId}',this.value)"
            onfocus="openPicker('${r.rowId}')"
            onblur="closePicker('${r.rowId}')"/>
          ${r.open&&filtered.length?`<div class="picker-dropdown">${filtered.map(px=>`<div class="picker-item" onmousedown="selectFromPicker('${r.rowId}','${px.id}')"><div class="pi-name">${px.name}</div><div class="pi-meta">${px.category} · <span class="pi-price">${N(px.price)}</span> · ${px.stock} in stock</div></div>`).join("")}</div>`:""}
          ${r.open&&r.search&&!filtered.length?`<div class="picker-dropdown"><div style="padding:14px;text-align:center;color:var(--muted);font-size:12.5px">No results for "${r.search}"</div></div>`:""}
        </div>`;
    return{picker,p,up,lt,qty};
  }

  const builtRows=rows.map((r,i)=>({r,i,...buildRow(r,i)}));
  const discountAmt=S.discount>0?Math.round(sub*S.discount/100):0;
  const grandTotal=Math.max(0,sub-discountAmt);

  return`
    <div class="panel">
      <div class="sale-meta">
        <div><div class="s-label">Payment method</div>
          <div class="pay-chips">
            ${["Cash","Card","Transfer","Credit"].map(m=>`<button class="chip ${S.payment===m?"active":""}" onclick="S.payment='${m}';renderContent()">${m}</button>`).join("")}
          </div>
        </div>
        <div style="display:flex;gap:14px;flex-wrap:wrap;align-items:flex-start">
          <div>
            <div class="s-label">Discount %</div>
            <div style="display:flex;align-items:center;gap:8px">
              <input type="number" inputmode="numeric" min="0" max="100" value="${S.discount||0}"
                oninput="S.discount=Math.min(100,Math.max(0,parseFloat(this.value)||0));renderContent()"
                style="width:64px;padding:7px 10px;border:1px solid var(--line);border-radius:var(--r-sm);background:var(--paper);color:var(--ink);font-size:13px;text-align:center"/>
              ${discountAmt>0?`<span style="font-size:12px;color:var(--success)">−${N(discountAmt)}</span>`:""}
            </div>
          </div>
          <div>
            <div class="s-label">Served by</div>
            <div style="font-size:13px;font-weight:600">${S.currentUser?S.currentUser.name.split(" ")[0]:"Staff"}</div>
            <div style="font-size:11px;color:var(--muted)">${TODAY}</div>
          </div>
        </div>
      </div>

      <div class="table-wrap">
        <table>
          <thead><tr><th style="min-width:260px">Product</th><th>Qty</th><th>Unit price</th><th>Line total</th><th></th></tr></thead>
          <tbody>
            ${builtRows.map(({r,p,up,lt,picker})=>`<tr class="sale-row">
              <td style="position:relative">${picker}</td>
              <td><input class="row-qty" type="number" inputmode="numeric" min="1" max="${p?p.stock:999}" value="${r.qty}" ${!p?"disabled":""} oninput="setRQ('${r.rowId}',this.value)"/></td>
              <td class="mono">${p?N(up):"—"}</td>
              <td class="mono" style="font-weight:600">${p?N(lt):"—"}</td>
              <td><span class="icon-btn" onclick="removeRow('${r.rowId}')">${icon("x",11)}</span></td>
            </tr>`).join("")}
          </tbody>
        </table>
      </div>
      <div style="padding:8px 17px">
        <button class="btn btn-ghost btn-sm" onclick="addRow()">${icon("plus",12)} Add item</button>
      </div>

      <div class="data-cards" style="padding:10px 14px">
        ${builtRows.map(({r,p,up,lt,picker,i})=>`<div class="data-card sale-row" style="position:relative;animation-delay:${i*.05}s">
          <div class="s-label" style="margin-bottom:8px">Item ${i+1}</div>
          <div style="margin-bottom:10px;position:relative">${picker}</div>
          <div style="display:flex;align-items:center;justify-content:space-between;gap:10px">
            <div style="display:flex;align-items:center;gap:8px">
              <span style="font-size:11px;color:var(--muted)">Qty:</span>
              <input class="row-qty" type="number" inputmode="numeric" min="1" max="${p?p.stock:999}" value="${r.qty}" ${!p?"disabled":""} oninput="setRQ('${r.rowId}',this.value)" style="width:64px"/>
            </div>
            <div style="text-align:right">${p?`<div class="mono" style="font-size:13px;font-weight:700">${N(lt)}</div><div class="dc-meta">${N(up)} × ${r.qty}</div>`:""}</div>
            <button class="icon-btn" onclick="removeRow('${r.rowId}')" style="flex-shrink:0">${icon("x",11)}</button>
          </div>
        </div>`).join("")}
        <button class="btn btn-ghost" style="width:100%;justify-content:center;margin-top:4px" onclick="addRow()">${icon("plus",13)} Add item</button>
      </div>

      <div class="sale-foot">
        <div class="sale-total-area">
          <div class="pl-row"><span>Subtotal</span><span class="mono">${N(sub)}</span></div>
          ${discountAmt>0?`<div class="pl-row"><span style="color:var(--success)">Discount (${S.discount}%)</span><span class="mono neg">−${N(discountAmt)}</span></div>`:""}
          <div class="pl-row total"><span>Total due</span><span class="mono" style="font-family:'Bodoni Moda',serif;font-size:20px">${N(grandTotal)}</span></div>
        </div>
        <button class="btn btn-primary" ${validRows().length===0?"disabled":""} onclick="completeSale()" style="min-width:140px;justify-content:center;padding:13px 18px">${icon("check",14)} Record sale</button>
      </div>
    </div>`;
}

function getLast7(){
  const days=[];
  for(let i=6;i>=0;i--){
    const d=dStr(i);
    const ds=salesOn(d),sm=sumS(ds);
    const label=i===0?"Today":i===1?"Yest":new Date(d+"T00:00").toLocaleDateString("en-GB",{weekday:"short"});
    days.push({date:d,label,revenue:sm.revenue,profit:sm.profit,count:ds.length});
  }
  return days;
}
function svgBars(days){
  const maxV=Math.max(...days.map(d=>d.revenue),1);
  const W=400,H=160,PB=24,PT=18,PL=4,PR=4;
  const n=days.length,slot=(W-PL-PR)/n;
  const barW=slot*0.55,gapW=(slot-barW)/2;
  const bars=days.map((d,i)=>{
    const x=PL+i*slot+gapW;
    const bh=Math.max(((d.revenue/maxV)*(H-PB-PT)),d.revenue>0?4:0);
    const y=H-PB-bh;
    const isToday=i===days.length-1;
    const label=d.count>0?abbreviate(d.revenue):"";
    return`
      <rect class="chart-bar" x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${barW.toFixed(1)}" height="${bh.toFixed(1)}"
        rx="3" fill="${isToday?"var(--accent)":"var(--line)"}" style="animation-delay:${(i*0.07).toFixed(2)}s"/>
      ${label?`<text x="${(x+barW/2).toFixed(1)}" y="${(y-4).toFixed(1)}" text-anchor="middle" font-size="9" fill="${isToday?"var(--accent)":"var(--muted)"}" class="chart-area" style="animation-delay:${(i*0.07+0.3).toFixed(2)}s">${label}</text>`:""}
      <text x="${(x+barW/2).toFixed(1)}" y="${(H-PB+13).toFixed(1)}" text-anchor="middle" font-size="9.5" fill="${isToday?"var(--ink)":"var(--muted)"}" font-weight="${isToday?"700":"400"}">${d.label}</text>`;
  }).join("");
  return`<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;display:block">${bars}</svg>`;
}
function abbreviate(n){
  if(n>=1000000)return(n/1000000).toFixed(1)+"M";
  if(n>=1000)return(n/1000).toFixed(0)+"k";
  return String(Math.round(n));
}
function svgDonut(slices,size=130){
  const total=slices.reduce((s,sl)=>s+sl.value,0);
  if(!total)return`<svg viewBox="0 0 ${size} ${size}" style="width:${size}px;height:${size}px"><circle cx="${size/2}" cy="${size/2}" r="${size/2.8}" fill="none" stroke="var(--line)" stroke-width="${size/6}"/></svg>`;
  const cx=size/2,cy=size/2,r=size/2.8,sw=size/5.5;
  let a=-Math.PI/2;
  const paths=slices.map((sl,i)=>{
    const sweep=(sl.value/total)*2*Math.PI*(0.98);
    const x1=cx+r*Math.cos(a),y1=cy+r*Math.sin(a);
    a+=sweep+Math.PI*0.01;
    const x2=cx+r*Math.cos(a),y2=cy+r*Math.sin(a);
    const large=sweep>Math.PI?1:0;
    return`<path d="M${x1.toFixed(2)} ${y1.toFixed(2)} A${r} ${r} 0 ${large} 1 ${x2.toFixed(2)} ${y2.toFixed(2)}"
      fill="none" stroke="${sl.color}" stroke-width="${sw}" stroke-linecap="round"
      class="chart-area" style="animation-delay:${(i*0.1).toFixed(2)}s"/>`;
  }).join("");
  return`<svg viewBox="0 0 ${size} ${size}" style="width:${size}px;height:${size}px;display:block">${paths}</svg>`;
}

function openPicker(rowId){
  S.saleRows.forEach(r=>r.open=r.rowId===rowId);
  renderContent();
  // focus the input
  setTimeout(()=>{const el=document.getElementById("pk_"+rowId);if(el&&el.focus)el.focus();},40);
}
function closePicker(rowId){
  setTimeout(()=>{
    const row=S.saleRows.find(r=>r.rowId===rowId);
    if(row){row.open=false; renderContent();}
  },180);
}
function setPickerSearch(rowId,txt){
  const row=S.saleRows.find(r=>r.rowId===rowId);
  if(row){row.search=txt; renderContent();}
}
function selectFromPicker(rowId,productId){
  const row=S.saleRows.find(r=>r.rowId===rowId);
  if(row){row.productId=productId;row.qty=row.qty||1;row.search="";row.open=false;}
  renderContent();
}
function clearPickerSelection(rowId){
  const row=S.saleRows.find(r=>r.rowId===rowId);
  if(row){row.productId="";row.search="";row.open=true;}
  renderContent();
  setTimeout(()=>{const el=document.getElementById("pk_"+rowId);if(el&&el.focus)el.focus();},40);

/* ─── CSV Export ─── */
function dlCSV(filename, rows){
  const csv = rows.map(r => r.map(c => {
    const s = String(c===null||c===undefined?'':c);
    return s.includes(',') || s.includes('"') || s.includes('\n') ? `"${s.replace(/"/g,'""')}"` : s;
  }).join(',')).join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
  a.download = filename;
  a.click();
}
function exportInventoryCSV(){
  const isAdmin = S.role==="admin";
  const headers = isAdmin
    ? ['SKU','Name','Category','Cost','Price','Profit','Margin %','Stock','Low Alert','Status']
    : ['SKU','Name','Category','Price','Stock','Status'];
  const rows = products.map(p => {
    const mg = p.price?(p.price-p.cost)/p.price*100:0;
    const st = p.stock===0?'Out of stock':p.stock<=p.low?'Low stock':'In stock';
    return isAdmin
      ? [p.sku,p.name,p.category,p.cost,p.price,p.price-p.cost,mg.toFixed(1),p.stock,p.low,st]
      : [p.sku,p.name,p.category,p.price,p.stock,st];
  });
  dlCSV('8fifteen-inventory-'+TODAY+'.csv', [headers,...rows]);
  showToast('Inventory exported');
}
function exportSalesCSV(){
  const list = filteredSales();
  const isAdmin = S.role==="admin";
  const headers = isAdmin
    ? ['Receipt','Date','Time','Items','Payment','Staff','Revenue','Cost','Profit']
    : ['Receipt','Date','Time','Items','Payment','Staff','Revenue'];
  const rows = list.map(s => {
    const qty = s.items.reduce((a,l)=>a+l.qty,0);
    return isAdmin
      ? [s.receipt,s.date,s.time,qty,s.payment,s.staff,s.total,s.cost,s.profit]
      : [s.receipt,s.date,s.time,qty,s.payment,s.staff,s.total];
  });
  dlCSV('8fifteen-sales-'+TODAY+'.csv', [headers,...rows]);
  showToast('Sales exported');
}

function renderModal(){
  const root=document.getElementById("modal-root");
  if(!S.modal){root.innerHTML="";return;}
  let body="";
  if(S.modal.type==="addProduct")body=productForm(null);
  else if(S.modal.type==="editProduct")body=productForm(products.find(p=>p.id===S.modal.id));
  else if(S.modal.type==="restock")body=restockForm(products.find(p=>p.id===S.modal.id));
  else if(S.modal.type==="addExpense")body=expenseForm();
  else if(S.modal.type==="addUser")body=userForm();
  else if(S.modal.type==="moreNav")body=moreNavSheet();
  else if(S.modal.type==="receipt")body=renderReceiptSheet(S.modal.sale);
  else if(S.modal.type==="demoSheet"){
    if(!S.loggedIn){ renderDemoSheet(); return; }
    body=moreNavSheet();
  }
  root.innerHTML=`<div class="overlay" onclick="if(event.target===this&&'${S.modal.type}'!=='receipt')closeModal()"></div><div class="sheet">${body}</div>`;
}

}
async function testConnection(){
  if(!GAS_URL) return;
  DB_STATE='loading'; renderSyncBadge();
  try{
    const r = await fetch(`${GAS_URL}?action=ping`);
    const d = await r.json();
    if(!d.ok) throw new Error(d.error);
    DB_STATE='live'; renderSyncBadge(); showToast('Connected to Google Sheets ✓');
  }catch(e){ DB_STATE='error'; renderSyncBadge(); showToast('Connection failed: '+e.message); }
}

function setRQ(rowId,v){const r=S.saleRows.find(x=>x.rowId===rowId);if(r)r.qty=Math.max(1,parseInt(v)||1);renderContent();}

function completeSale(){
  const valid=validRows();if(!valid.length){alert("Add at least one product.");return;}
  const agg={};valid.forEach(r=>{agg[r.productId]=(agg[r.productId]||0)+r.qty;});
  for(const pid in agg){const p=products.find(x=>x.id===pid);if(!p||agg[pid]>p.stock){alert(`${p?p.name:"Product"} only has ${p?p.stock:0} in stock.`);return;}}
  const items=Object.entries(agg).map(([pid,qty])=>{const p=products.find(x=>x.id===pid);return{productId:p.id,name:p.name,category:p.category,qty,price:p.price,cost:p.cost};});
  const subtotal=items.reduce((s,l)=>s+l.price*l.qty,0);
  const cost=items.reduce((s,l)=>s+l.cost*l.qty,0);
  const discountAmt=S.discount>0?Math.round(subtotal*S.discount/100):0;
  const total=Math.max(0,subtotal-discountAmt);
  const time=new Date().toTimeString().slice(0,5),rc="8FW-"+(rcCounter++);
  const staffName=S.currentUser?S.currentUser.name:"Staff";
  const saleRecord={id:uid("s"),receipt:rc,date:TODAY,time,items,payment:S.payment,
    staff:staffName,total,cost,profit:total-cost,discount:S.discount||0};
  sales.push(saleRecord);
  products=products.map(p=>{const q=agg[p.id];return q?{...p,stock:p.stock-q}:p;});
  sheetPost('addSale',{...saleRecord,items:items.map(i=>({...i,id:uid('si'),saleId:saleRecord.id}))});
  Object.entries(agg).forEach(([pid,q])=>{const p=products.find(x=>x.id===pid);if(p)sheetPost('updateStock',{id:pid,stock:p.stock});});
  S.saleRows=[{rowId:uid("row"),productId:"",qty:1,search:"",open:false}];
  S.discount=0;
  S.modal={type:"receipt",sale:saleRecord};
  renderContent();renderModal();
}

function saveAddProd(){
  const name=document.getElementById("f-name").value.trim();
  if(!name){alert("Name required.");return;}
  const sku=document.getElementById("f-sku").value.trim()||("GEN-"+Math.floor(Math.random()*900+100));
  const p={id:uid("p"),sku,name,category:document.getElementById("f-cat").value,
    cost:parseFloat(document.getElementById("f-cost").value)||0,
    price:parseFloat(document.getElementById("f-price").value)||0,
    stock:parseInt(document.getElementById("f-stock").value)||0,
    low:parseInt(document.getElementById("f-low").value)||5};
  products.push(p);
  sheetPost('addProduct', p);
  closeModal();renderContent();showToast(`${name} added`);
}
function saveEditProd(id){
  const idx=products.findIndex(p=>p.id===id);if(idx<0)return;
  const name=document.getElementById("f-name").value.trim();
  const updated={...products[idx],name,sku:document.getElementById("f-sku").value.trim(),
    category:document.getElementById("f-cat").value,
    cost:parseFloat(document.getElementById("f-cost").value)||0,
    price:parseFloat(document.getElementById("f-price").value)||0,
    stock:parseInt(document.getElementById("f-stock").value)||0,
    low:parseInt(document.getElementById("f-low").value)||5};
  products[idx]=updated;
  sheetPost('updateProduct', updated);
  closeModal();renderContent();showToast(`${name} updated`);
}
function delProduct(id){
  const p=products.find(x=>x.id===id);if(!p)return;
  if(!confirm(`Remove "${p.name}"?`))return;
  products=products.filter(x=>x.id!==id);
  sheetPost('deleteProduct',{id});
  renderContent();showToast(`${p.name} removed`);
}
function saveRestock(id){
  const p=products.find(x=>x.id===id);if(!p)return;
  const type=document.getElementById("f-adj-type").value;
  let qty=parseInt(document.getElementById("f-adj-qty").value)||0;
  const reason=document.getElementById("f-adj-reason").value.trim()||(type==="add"?"Restock":"Removed");
  if(qty<=0){alert("Enter a quantity > 0.");return;}
  if(type==="remove")qty=-qty;
  if(p.stock+qty<0){alert("Cannot remove more than current stock.");return;}
  p.stock+=qty;
  stockLog.push({name:p.name,qty,reason,time:new Date().toTimeString().slice(0,5)});
  sheetPost('updateStock',{id:p.id, stock:p.stock});
  sheetPost('logStock',{id:uid('sl'),productId:p.id,name:p.name,qty,reason,time:new Date().toTimeString().slice(0,5),date:TODAY});
  closeModal();renderContent();showToast(`${p.name}: stock now ${p.stock}`);
}
function saveExpense(){
  const desc=document.getElementById("f-exp-desc").value.trim();
  const amt=parseFloat(document.getElementById("f-exp-amt").value)||0;
  if(!desc||amt<=0){alert("Enter description and amount.");return;}
  const ex={id:"e"+(expCounter++),date:document.getElementById("f-exp-date").value||TODAY,
    description:desc,category:document.getElementById("f-exp-cat").value,amount:amt};
  expenses.push(ex);
  sheetPost('addExpense', ex);
  closeModal();renderContent();showToast("Expense recorded");
}
function delExpense(id){
  expenses=expenses.filter(e=>e.id!==id);
  sheetPost('deleteExpense',{id});
  renderContent();
}
function saveUser(){
  const name=document.getElementById("f-u-name").value.trim();
  const email=document.getElementById("f-u-email").value.trim();
  if(!name||!email){alert("Name and email required.");return;}
  const u={id:uid("u"),name,email,role:document.getElementById("f-u-role").value};
  users.push(u);
  sheetPost('addUser', u);
  closeModal();renderContent();showToast(`Invite sent to ${name}`);
}
function delUser(id){
  const u=users.find(x=>x.id===id);if(!u)return;
  if(!confirm(`Remove ${u.name}?`))return;
  users=users.filter(x=>x.id!==id);
  sheetPost('deleteUser',{id});
  renderContent();
}
