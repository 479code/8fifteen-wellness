<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="theme-color" content="#131210"/>
<title>8fifteen Wellness</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='50' fill='%23131210'/%3E%3Ccircle cx='50' cy='50' r='46' fill='none' stroke='%23C9A766' stroke-width='2'/%3E%3Ccircle cx='50' cy='50' r='39' fill='none' stroke='%23C9A766' stroke-width='0.8' opacity='0.5'/%3E%3Ctext x='50' y='64' font-family='Georgia%2Cserif' font-size='34' font-weight='bold' text-anchor='middle' fill='%23C9A766'%3E815%3C/text%3E%3C/svg%3E"/>
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='50' fill='%23131210'/%3E%3Ccircle cx='50' cy='50' r='46' fill='none' stroke='%23C9A766' stroke-width='2'/%3E%3Ctext x='50' y='64' font-family='Georgia%2Cserif' font-size='34' font-weight='bold' text-anchor='middle' fill='%23C9A766'%3E815%3C/text%3E%3C/svg%3E"/>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bodoni+Moda:opsz,wght@6..96,400;6..96,600;6..96,700&family=Archivo:wght@700;900&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap');

/* ─── Tokens ─── */
:root{
  --ink:#1A1814; --bg:#F1EBDD; --surface:#F8F4EA; --paper:#FFFFFF;
  --line:#E2DAC6; --muted:#8A8170;
  --accent:#9C7A3C; --accent-ink:#FFF; --accent-dark:#7E632F; --accent-bg:#F1E6CE;
  --success:#3E6B4A; --success-bg:#E3EAE1;
  --warn:#8A6A2E; --warn-bg:#F2E6C9;
  --danger:#9B4B3A; --danger-bg:#F3DFD8;
  --nav-bg:#131210; --nav-txt:#EFE9DA; --nav-muted:#948C7A;
  --nav-act:#C9A766; --nav-act-ink:#131210;
  --shadow:0 2px 12px rgba(20,18,12,.08);
  --shadow-lg:0 8px 32px rgba(20,18,12,.14);
  --r:12px; --r-sm:8px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --safe-top: env(safe-area-inset-top, 0px);
}
body.dark{
  --ink:#F1ECE0; --bg:#0E0D0B; --surface:#141310; --paper:#1B1916;
  --line:#2E2920; --muted:#A39A86;
  --accent:#C9A766; --accent-ink:#15130F; --accent-dark:#DCC084; --accent-bg:#2B2415;
  --success:#7FAE8B; --success-bg:#1C2620;
  --warn:#D8B567; --warn-bg:#2E2615;
  --danger:#D08A78; --danger-bg:#2E1C18;
  --shadow:0 2px 12px rgba(0,0,0,.3); --shadow-lg:0 8px 32px rgba(0,0,0,.4);
}

/* ─── Reset ─── */
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{height:100%;font-size:16px;}
body{margin:0;font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--ink);height:100%;
  transition:background .2s,color .2s;-webkit-font-smoothing:antialiased;}
button,input,select,textarea{font-family:inherit;font-size:inherit;}
button{cursor:pointer;}
img,svg{display:block;}

/* ─── Animations ─── */
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes scaleIn{from{opacity:0;transform:scale(.94)}to{opacity:1;transform:scale(1)}}
@keyframes sheetUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(12px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}
@keyframes lmDraw{to{stroke-dashoffset:0}}
@keyframes lmSpin{to{transform:rotate(360deg)}}
@keyframes lmFade{to{opacity:.45}}
@keyframes lmPop{to{opacity:1;transform:scale(1)}}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.001ms!important;animation-iteration-count:1!important;transition-duration:.001ms!important}}

/* ─── Layout shell ─── */
#app{display:flex;height:100%;height:100dvh;overflow:hidden;position:relative;}

/* ─── Sidebar (desktop) ─── */
.sidebar{
  width:240px;flex-shrink:0;background:var(--nav-bg);color:var(--nav-txt);
  display:flex;flex-direction:column;padding:22px 16px 18px;
  transition:transform .28s cubic-bezier(.4,0,.2,1);z-index:300;
}
.brand-mark{display:flex;justify-content:center;color:var(--nav-txt);margin-bottom:12px;}
.brand-word{font-family:'Archivo',sans-serif;font-weight:900;font-size:18px;letter-spacing:.15em;text-align:center;color:var(--nav-txt);}
.brand-sub{font-size:9px;letter-spacing:.22em;text-align:center;color:var(--nav-muted);margin:4px 0 22px;text-transform:uppercase;}
.nav-list{display:flex;flex-direction:column;gap:2px;}
.nav-btn{display:flex;align-items:center;gap:10px;width:100%;padding:10px 12px;border-radius:var(--r-sm);border:none;background:transparent;color:var(--nav-muted);font-size:13.5px;text-align:left;transition:background .15s,color .15s,transform .1s;}
.nav-btn:hover{background:rgba(239,233,218,.07);color:var(--nav-txt);}
.nav-btn.active{background:var(--nav-act);color:var(--nav-act-ink);font-weight:700;}
.nav-btn:active{transform:scale(.97);}
.nav-btn svg{flex-shrink:0;}
.sidebar-foot{margin-top:auto;padding-top:14px;border-top:1px solid rgba(239,233,218,.1);font-size:10px;color:var(--nav-muted);line-height:1.7;}

/* ─── Main area ─── */
.main{flex:1;min-width:0;display:flex;flex-direction:column;background:var(--surface);overflow:hidden;}
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 24px;border-bottom:1px solid var(--line);
  background:var(--surface);flex-shrink:0;
}
.topbar-left{display:flex;align-items:center;gap:12px;min-width:0;}
.topbar h1{font-family:'Bodoni Moda',serif;font-size:20px;font-weight:600;margin:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.topbar-sub{font-size:11.5px;color:var(--muted);margin-top:2px;display:flex;align-items:center;gap:6px;}
.topbar-actions{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.role-toggle{display:flex;border:1px solid var(--line);border-radius:999px;overflow:hidden;background:var(--paper);}
.role-toggle button{padding:6px 14px;border:none;background:transparent;color:var(--muted);font-size:12px;font-weight:600;}
.role-toggle button.active{background:var(--ink);color:var(--surface);}
.icon-action{width:34px;height:34px;border-radius:999px;border:1px solid var(--line);background:var(--paper);display:flex;align-items:center;justify-content:center;color:var(--ink);}
.icon-action:hover{border-color:var(--ink);}
.hamburger{display:none;}

/* ─── Content scroll ─── */
.content{flex:1;overflow-y:auto;padding:20px 24px;-webkit-overflow-scrolling:touch;}
.view-enter{animation:fadeUp .32s ease both;}

/* ─── Stat grids ─── */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px;}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px;}
.stat-card{background:var(--paper);border:1px solid var(--line);border-radius:var(--r);padding:15px;box-shadow:var(--shadow);animation:fadeUp .4s ease both;}
.stat-top{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.stat-icon{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;color:#fff;flex-shrink:0;}
.stat-label{font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;font-weight:600;}
.stat-value{font-family:'Bodoni Moda',serif;font-size:22px;font-weight:600;line-height:1.1;}
.stat-sub{font-size:11px;color:var(--muted);margin-top:3px;}

/* ─── Panel ─── */
.panel{background:var(--paper);border:1px solid var(--line);border-radius:var(--r);margin-bottom:14px;box-shadow:var(--shadow);overflow:hidden;animation:fadeUp .38s ease both;}
.panel-head{padding:13px 17px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;}
.panel-head h3{margin:0;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);}
.two-col{display:grid;grid-template-columns:1.3fr 1fr;gap:14px;}

/* ─── Tables ─── */
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}
table{width:100%;border-collapse:collapse;font-size:12.5px;}
th{font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);font-weight:700;padding:9px 16px;border-bottom:1px solid var(--line);text-align:left;white-space:nowrap;background:var(--paper);}
td{padding:10px 16px;border-bottom:1px solid var(--line);white-space:nowrap;}
tr:last-child td{border-bottom:none;}
tbody tr{transition:background .12s;}
tbody tr:hover td{background:var(--bg);}
.empty-row td{text-align:center;color:var(--muted);padding:28px;white-space:normal;font-size:13px;}

/* ─── Mobile data cards (replaces tables on small screens) ─── */
.data-cards{display:none;}
.data-card{background:var(--paper);border:1px solid var(--line);border-radius:var(--r-sm);padding:14px;margin-bottom:8px;animation:fadeUp .3s ease both;}
.dc-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;}
.dc-row:last-child{margin-bottom:0;}
.dc-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;}
.dc-val{font-size:13px;font-weight:600;}
.dc-title{font-size:14px;font-weight:600;margin-bottom:8px;}
.dc-meta{font-size:11.5px;color:var(--muted);}
.dc-actions{display:flex;gap:7px;margin-top:10px;padding-top:10px;border-top:1px solid var(--line);}
.dc-actions button{flex:1;}

/* ─── Badges ─── */
.badge{font-size:10px;font-weight:700;padding:3px 9px;border-radius:999px;display:inline-block;letter-spacing:.02em;}
.badge-ok{background:var(--success-bg);color:var(--success);}
.badge-low{background:var(--warn-bg);color:var(--warn);}
.badge-out{background:var(--danger-bg);color:var(--danger);animation:pulse 1.8s ease-in-out infinite;}
.badge-pay{background:var(--bg);color:var(--ink);border:1px solid var(--line);}

/* ─── Toolbar ─── */
.toolbar{display:flex;gap:8px;margin-bottom:14px;align-items:center;flex-wrap:wrap;}
.search-box{display:flex;align-items:center;gap:7px;background:var(--paper);border:1px solid var(--line);border-radius:var(--r-sm);padding:8px 12px;flex:1;min-width:0;}
.search-box input{border:none;outline:none;font-size:13px;flex:1;background:transparent;color:var(--ink);min-width:0;}
.chip-row{display:flex;gap:6px;flex-wrap:wrap;}
.chip{padding:7px 14px;border-radius:999px;border:1px solid var(--line);background:var(--paper);font-size:12px;color:var(--muted);font-weight:500;transition:background .14s,color .14s,transform .1s;}
.chip.active{background:var(--ink);color:var(--surface);border-color:var(--ink);font-weight:700;}
.chip:active{transform:scale(.95);}
.date-input{padding:8px 10px;border:1px solid var(--line);border-radius:var(--r-sm);font-size:12.5px;background:var(--paper);color:var(--ink);}

/* ─── Buttons ─── */
.btn{font-size:13px;font-weight:700;padding:9px 16px;border-radius:var(--r-sm);border:none;cursor:pointer;display:inline-flex;align-items:center;gap:6px;white-space:nowrap;letter-spacing:.01em;transition:background .14s,transform .1s;}
.btn-primary{background:var(--accent);color:var(--accent-ink);}
.btn-primary:hover{background:var(--accent-dark);}
.btn-primary:active{transform:scale(.97);}
.btn-primary:disabled{background:var(--line);color:var(--muted);cursor:not-allowed;}
.btn-ghost{background:transparent;border:1px solid var(--line);color:var(--ink);}
.btn-ghost:hover{border-color:var(--ink);}
.btn-ghost:active{transform:scale(.97);}
.btn-sm{padding:6px 11px;font-size:11.5px;border-radius:6px;}
.icon-btn{min-width:32px;height:32px;border-radius:6px;border:1px solid var(--line);background:var(--paper);display:inline-flex;align-items:center;justify-content:center;color:var(--ink);transition:border-color .14s,transform .1s;}
.icon-btn:hover{border-color:var(--ink);}
.icon-btn:active{transform:scale(.92);}

/* ─── Sales entry ─── */
.sale-meta{display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:14px;padding:15px 17px;border-bottom:1px solid var(--line);}
.sale-meta .s-label{font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:7px;font-weight:700;}
.pay-chips{display:flex;gap:6px;flex-wrap:wrap;}
.row-select{width:100%;padding:9px 10px;border:1px solid var(--line);border-radius:var(--r-sm);background:var(--paper);color:var(--ink);font-size:13px;}
.row-qty{width:68px;padding:9px 10px;border:1px solid var(--line);border-radius:var(--r-sm);background:var(--paper);color:var(--ink);font-size:13px;text-align:center;}
.row-select:disabled,.row-qty:disabled{opacity:.5;}
.sale-foot{display:flex;align-items:center;justify-content:space-between;padding:15px 17px;gap:10px;flex-wrap:wrap;border-top:1px solid var(--line);}
.sale-total-area{min-width:200px;}
.pl-row{display:flex;justify-content:space-between;padding:8px 0;font-size:13px;border-bottom:1px dashed var(--line);}
.pl-row.total{border:none;border-top:2px solid var(--ink);padding-top:12px;font-weight:700;margin-top:4px;}
.pl-row .neg{color:var(--danger);}
.pl-row.sub .plabel{color:var(--muted);padding-left:14px;}
.pl-block{padding:17px;}

/* ─── Category / accounting ─── */
.cat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:14px;}
.cat-card{background:var(--paper);border:1px solid var(--line);border-radius:var(--r);padding:15px;box-shadow:var(--shadow);animation:fadeUp .38s ease both;}
.cat-card h4{margin:0 0 10px;font-size:13.5px;font-weight:700;display:flex;align-items:center;justify-content:space-between;}
.cat-card .crow{display:flex;justify-content:space-between;font-size:12px;padding:4px 0;color:var(--muted);}
.cat-card .crow b{color:var(--ink);font-weight:600;}
.cat-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px;}
.bar-row{display:flex;align-items:center;gap:10px;padding:8px 0;}
.bar-lbl{font-size:12px;width:110px;flex-shrink:0;}
.bar-track{flex:1;height:8px;background:var(--bg);border-radius:999px;overflow:hidden;}
.bar-fill{height:100%;border-radius:999px;transition:width .6s ease;}
.bar-val{font-size:11px;width:84px;text-align:right;flex-shrink:0;color:var(--muted);}

/* ─── Role pill ─── */
.role-pill{font-size:10px;font-weight:700;padding:2px 9px;border-radius:999px;text-transform:uppercase;letter-spacing:.04em;}
.role-pill.admin{background:var(--success-bg);color:var(--success);}
.role-pill.staff{background:var(--warn-bg);color:var(--warn);}

/* ─── Toast ─── */
.toast{position:fixed;bottom:calc(70px + var(--safe-bottom));left:50%;transform:translateX(-50%);
  background:var(--nav-bg);color:var(--nav-txt);padding:11px 18px;border-radius:999px;
  font-size:13px;display:flex;align-items:center;gap:8px;box-shadow:var(--shadow-lg);
  white-space:nowrap;z-index:600;animation:toastIn .25s ease both;}

/* ─── Modal / Bottom sheet ─── */
.overlay{position:fixed;inset:0;background:rgba(12,10,7,.55);z-index:400;animation:fadeIn .18s ease both;}
.sheet{
  position:fixed;bottom:0;left:0;right:0;
  background:var(--paper);border-radius:20px 20px 0 0;
  max-height:92dvh;overflow-y:auto;
  z-index:500;animation:sheetUp .28s cubic-bezier(.32,0,.67,0) both;
  padding-bottom:calc(20px + var(--safe-bottom));
}
.sheet-handle{width:40px;height:4px;background:var(--line);border-radius:999px;margin:14px auto 0;}
.sheet-head{padding:14px 20px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--line);}
.sheet-head h3{margin:0;font-size:16px;font-weight:600;font-family:'Bodoni Moda',serif;}
.sheet-body{padding:18px 20px;}
.sheet-foot{padding:12px 20px;border-top:1px solid var(--line);display:flex;gap:9px;justify-content:flex-end;}
.field{margin-bottom:13px;}
.field label{display:block;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px;font-weight:700;}
.field input,.field select{width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:var(--r-sm);font-size:14px;background:var(--surface);color:var(--ink);}
.field input:focus,.field select:focus{outline:2px solid var(--accent);border-color:var(--accent);}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.margin-preview{background:var(--accent-bg);border-radius:var(--r-sm);padding:11px 13px;font-size:12px;color:var(--muted);display:flex;justify-content:space-between;margin-bottom:14px;}
.margin-preview b{color:var(--accent-dark);font-family:'IBM Plex Mono',monospace;}
body.dark .margin-preview b{color:var(--accent);}

/* ─── Logo animation classes ─── */
.lm-draw{animation:lmDraw 1.6s ease forwards;}
.lm-draw2{animation:lmDraw 1.6s .25s ease forwards;}
.lm-rotate{transform-box:view-box;transform-origin:60px 60px;animation:lmSpin 56s linear infinite;}
.lm-divider{opacity:0;animation:lmFade .8s 1.3s ease forwards;}
.lm-center{opacity:0;transform:scale(.84);transform-box:view-box;transform-origin:60px 60px;animation:lmPop .55s 1.1s cubic-bezier(.34,1.56,.64,1) forwards;}

/* ─── Bottom tab bar (mobile) ─── */
.bottom-nav{display:none;}

/* ─── Backdrop for drawer ─── */
.drawer-backdrop{position:fixed;inset:0;background:rgba(12,10,7,.5);z-index:290;opacity:0;pointer-events:none;transition:opacity .22s ease;}
.drawer-backdrop.show{opacity:1;pointer-events:auto;}
.sidebar-close-btn{display:none;}

/* ════════════════════════════════════════════
   RESPONSIVE — TABLET  ≤ 960px
═══════════════════════════════════════════════ */
@media(max-width:960px){
  .stat-grid,.kpi-grid{grid-template-columns:repeat(2,1fr);}
  .cat-grid{grid-template-columns:repeat(2,1fr);}
  .two-col{grid-template-columns:1fr;}
}

/* ════════════════════════════════════════════
   RESPONSIVE — MOBILE  ≤ 680px
═══════════════════════════════════════════════ */
@media(max-width:680px){

  /* ── Sidebar drawer ── */
  .sidebar{
    position:fixed;top:0;left:0;bottom:0;width:84%;max-width:300px;
    transform:translateX(-100%);transition:transform .28s cubic-bezier(.4,0,.2,1);
    z-index:300;padding-top:calc(20px + var(--safe-top));
    padding-bottom:calc(20px + var(--safe-bottom));
    overflow-y:auto;
  }
  .sidebar.open{transform:translateX(0);}
  .hamburger{display:flex;}
  .sidebar-close-btn{
    display:flex;position:absolute;top:calc(14px + var(--safe-top));right:14px;
    width:34px;height:34px;border-radius:8px;border:1px solid rgba(239,233,218,.15);
    background:transparent;color:var(--nav-txt);align-items:center;justify-content:center;
  }
  .nav-btn{padding:13px 12px;font-size:14px;min-height:48px;}

  /* ── Topbar ── */
  .topbar{padding:12px 16px;padding-top:calc(12px + var(--safe-top));gap:8px;}
  .topbar h1{font-size:16.5px;}
  .topbar-sub{display:none;}
  .role-toggle{display:none;}
  .icon-action{width:40px;height:40px;}

  /* ── Content area ── */
  .content{padding:14px 14px calc(84px + var(--safe-bottom)) 14px;}

  /* ── Stat/KPI grids ── */
  .stat-grid,.kpi-grid{grid-template-columns:repeat(2,1fr);gap:9px;margin-bottom:14px;}
  .cat-grid{grid-template-columns:1fr 1fr;gap:9px;}
  .stat-card,.cat-card{padding:12px;}
  .stat-value{font-size:18px;}
  .stat-label{font-size:10px;}
  .two-col{grid-template-columns:1fr;}
  .report-grid{grid-template-columns:1fr;}

  /* ── Tables → hide on mobile, show data-cards ── */
  .table-wrap table{display:none;}
  .data-cards{display:block;}

  /* ── Toolbar / filters ── */
  .toolbar{flex-direction:column;gap:8px;}
  .search-box{max-width:none;min-height:44px;}
  .search-box input{font-size:16px;} /* prevent iOS auto-zoom */
  .chip-row{
    width:100%;overflow-x:auto;flex-wrap:nowrap;padding-bottom:3px;
    scrollbar-width:none;-ms-overflow-style:none;gap:7px;
  }
  .chip-row::-webkit-scrollbar{display:none;}
  .chip{flex-shrink:0;padding:9px 16px;font-size:12.5px;min-height:38px;}
  .date-input{font-size:16px;padding:10px;min-height:44px;}

  /* ── Buttons — larger touch targets ── */
  .btn{min-height:44px;padding:10px 16px;}
  .btn-sm{min-height:38px;padding:8px 13px;font-size:12px;}
  .icon-btn{width:36px;height:36px;}

  /* ── Panel heads ── */
  .panel-head{padding:12px 15px;flex-wrap:wrap;gap:8px;}

  /* ── Sales entry ── */
  .sale-meta{flex-direction:column;gap:14px;padding:14px 15px;}

  .pay-chips{gap:8px;}
  .pay-chips .chip{flex:1;text-align:center;justify-content:center;min-height:42px;}
  .sale-foot{flex-direction:column;gap:10px;padding:14px 15px;}
  .sale-foot .btn{width:100%;justify-content:center;min-height:50px;font-size:15px;}
  .sale-total-area{width:100%;}
  .picker-input{font-size:16px;min-height:46px;} /* prevent iOS zoom */
  .picker-selected{min-height:46px;}
  .row-qty{font-size:16px;min-height:44px;width:80px;}

  /* ── History ── */
  .data-card{padding:14px;border-radius:var(--r-sm);margin-bottom:10px;}
  .dc-title{font-size:14.5px;}

  /* ── Bottom nav ── */
  .bottom-nav{
    display:flex;position:fixed;bottom:0;left:0;right:0;
    background:var(--nav-bg);
    padding:6px 0 calc(6px + var(--safe-bottom));
    border-top:1px solid rgba(239,233,218,.12);z-index:200;
    box-shadow:0 -4px 20px rgba(0,0,0,.25);
  }
  .bnav-btn{
    flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
    padding:6px 4px;border:none;background:transparent;color:var(--nav-muted);
    font-size:10px;font-weight:600;letter-spacing:.03em;
    transition:color .15s,transform .1s;min-height:52px;justify-content:center;
  }
  .bnav-btn.active{color:var(--nav-act);}
  .bnav-btn:active{transform:scale(.9);}
  .bnav-btn svg{width:22px;height:22px;}

  /* ── Bottom sheets / modals ── */
  .sheet{border-radius:22px 22px 0 0;max-height:94dvh;}
  .sheet-head{padding:15px 19px;}
  .sheet-body{padding:16px 19px;}
  .field-row{grid-template-columns:1fr;}
  .field input,.field select{font-size:16px;padding:13px 12px;min-height:48px;}
  .field label{font-size:11px;}
  .sheet-foot{padding:14px 19px;gap:10px;}
  .sheet-foot .btn{flex:1;justify-content:center;min-height:48px;}

  /* ── Toast ── */
  .toast{
    bottom:calc(78px + var(--safe-bottom));
    left:14px;right:14px;transform:none;
    width:auto;border-radius:10px;
    animation:fadeUp .25s ease both;
  }

  /* ── More menu ── */
  .more-nav-item{
    display:flex;align-items:center;gap:14px;width:100%;
    padding:16px 20px;min-height:56px;
    border:none;background:transparent;color:var(--ink);
    font-size:15px;font-weight:500;border-bottom:1px solid var(--line);
    text-align:left;transition:background .12s;
  }
  .more-nav-item:last-child{border-bottom:none;}
  .more-nav-item:active{background:var(--bg);}
  .more-nav-item.active{color:var(--accent);font-weight:700;}
  .more-nav-item svg{flex-shrink:0;color:var(--muted);}
  .more-nav-item.active svg{color:var(--accent);}

  /* ── Login ── */
  .login-card{padding:28px 22px;}
  .login-field input{font-size:16px;} /* prevent iOS zoom */

  /* ── Settings ── */
  .pl-row{flex-wrap:wrap;}

  /* ── Prevent overflow ── */
  .content > .view-enter,
  .panel, .stat-card, .cat-card, .chart-panel{
    max-width:100%;overflow-x:hidden;
  }
}

@media(max-width:380px){

  .bnav-btn{font-size:9px;}
  .bnav-btn svg{width:20px;height:20px;}
  .topbar h1{font-size:15px;}
}

/* ─── Login screen ─── */
@keyframes loginFade{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.login-wrap{
  position:fixed;inset:0;background:var(--nav-bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:900;padding:24px;
}
.login-card{
  width:100%;max-width:360px;background:rgba(255,255,255,.04);
  border:1px solid rgba(239,233,218,.12);border-radius:16px;padding:32px 28px;
  animation:loginFade .5s .2s ease both;
}
.login-logo{display:flex;flex-direction:column;align-items:center;margin-bottom:28px;color:var(--nav-txt);}
.login-logo .lw{font-family:'Archivo',sans-serif;font-weight:900;font-size:22px;letter-spacing:.15em;margin-top:10px;color:var(--nav-txt);}
.login-logo .ls{font-size:9px;letter-spacing:.22em;color:var(--nav-muted);text-transform:uppercase;margin-top:4px;}
.login-field{margin-bottom:14px;}
.login-field label{display:block;font-size:10.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--nav-muted);margin-bottom:7px;font-weight:600;}
.login-field input{
  width:100%;padding:12px 14px;border:1px solid rgba(239,233,218,.18);
  border-radius:var(--r-sm);background:rgba(255,255,255,.06);color:var(--nav-txt);
  font-size:15px;outline:none;
}
.login-field input:focus{border-color:var(--nav-act);}
.login-field input::placeholder{color:var(--nav-muted);}
.login-err{font-size:12px;color:var(--danger);text-align:center;margin-bottom:12px;min-height:18px;}
.login-btn{
  width:100%;padding:13px;border-radius:var(--r-sm);border:none;
  background:var(--nav-act);color:var(--nav-act-ink);font-size:14px;font-weight:700;
  cursor:pointer;letter-spacing:.03em;
}
.login-btn:active{transform:scale(.98);}
.login-demo{
  width:100%;margin-top:10px;padding:11px;border-radius:var(--r-sm);

}

.login-hint{font-size:10.5px;color:var(--nav-muted);text-align:center;margin-top:18px;line-height:1.7;}

/* ─── Receipt sheet ─── */
.receipt-body{padding:0 20px 20px;font-size:13px;}
.receipt-header{text-align:center;padding:20px 0 16px;border-bottom:1px dashed var(--line);margin-bottom:16px;color:var(--nav-txt);background:var(--nav-bg);margin:-1px -20px 16px;padding:20px;}

@keyframes barGrow{from{transform:scaleY(0);transform-origin:bottom}to{transform:scaleY(1);transform-origin:bottom}}

.donut-grid{display:grid;grid-template-columns:140px 1fr;gap:16px;align-items:center;}

.sparkrow:last-child{border-bottom:none;}
@media(max-width:680px){
  .report-grid{grid-template-columns:1fr;}
  .donut-grid{grid-template-columns:1fr;justify-items:center;}
}

let DB_STATE = 'offline'; // 'offline' | 'loading' | 'live' | 'error'
let SYNC_PENDING = 0;

async function loadFromSheets() {
  if (!GAS_URL) { DB_STATE='offline'; renderSyncBadge(); return; }
  DB_STATE='loading'; renderSyncBadge();
  try {
    const r = await fetch(`${GAS_URL}?action=getAllData`);
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const d = await r.json();
    if (!d.ok) throw new Error(d.error || 'Server error');

    /* ── Sanitize products ── */
    if (d.products && d.products.length) {
      products = d.products.map(p => {
        let name     = String(p.name     || '').trim();
        let sku      = String(p.sku      || '').trim();
        let category = String(p.category || '').trim();
        const cost   = Math.max(0, parseFloat(p.cost)  || 0);
        const price  = Math.max(0, parseFloat(p.price) || 0);
        const stock  = Math.max(0, parseInt(p.stock)   || 0);
        const low    = Math.max(0, parseInt(p.low)     || 5);

        // Fix misaligned columns: if name is a known category and category looks
        // like a real product name, they were entered in the wrong columns → swap.
        if (CATS.includes(name) && category && !CATS.includes(category)) {
          [name, category] = [category, name];
        }
        // If category still isn't a known cat, keep whatever was there or default
        if (!CATS.includes(category)) {
          // Try to match loosely
          const match = CATS.find(c => category.toLowerCase().includes(c.toLowerCase()));
          category = match || CATS[0] || 'General';
        }
        // If name ended up empty or same as sku nonsensically, use sku as name
        if (!name || name === category) name = sku || 'Unnamed product';

        return { ...p, name, sku, category,
          subcategory: String(p.subcategory||'').trim() || '',
          cost, price, stock, low };
      }).filter(p => p.id && p.name && p.price > 0);
    }

    /* ── Sanitize sales ── */
    if (d.sales && d.sales.length) {
      sales = d.sales.filter(s => {
        const total = parseFloat(s.total) || 0;
        if (total > 1e10)           return false; // Unix timestamp stored as total
        if (!s.receipt || s.receipt === 'undefined' || s.receipt === 'null') return false;
        if (!s.date)                return false;
        const dt = new Date(s.date + 'T00:00');
        if (isNaN(dt.getTime()))    return false; // Invalid Date
        if (dt.getFullYear() < 2020 || dt.getFullYear() > 2099) return false;
        return true;
      }).map(s => ({
        ...s,
        total:    Math.max(0, parseFloat(s.total)    || 0),
        cost:     Math.max(0, parseFloat(s.cost)     || 0),
        profit:   parseFloat(s.profit)  || 0,
        discount: Math.max(0, parseFloat(s.discount) || 0),
        items:    Array.isArray(s.items) ? s.items.filter(l => l && l.name) : [],
        time:     (s.time && s.time !== 'undefined') ? s.time : '00:00',
        payment:  (s.payment && s.payment !== 'undefined') ? s.payment : 'Cash',
        staff:    (s.staff && s.staff !== 'undefined') ? s.staff : 'Staff',
        customer: (s.customer && s.customer !== 'undefined') ? s.customer : '',
      }));
    }

    /* ── Sanitize expenses ── */
    if (d.expenses && d.expenses.length) {
      expenses = d.expenses.filter(e =>
        e.id && e.description && parseFloat(e.amount) > 0
      ).map(e => ({
        ...e,
        amount:   Math.max(0, parseFloat(e.amount) || 0),
        date:     e.date || TODAY,
        category: e.category || 'Other',
      }));
    }

    /* ── Sanitize users ── */
    if (d.users && d.users.length) {
      users = d.users.filter(u => u.id && u.name && u.email).map(u => ({
        ...u,
        name:  String(u.name).trim(),
        email: String(u.email).trim(),
        role:  (u.role && u.role.trim()) ? u.role.trim() : 'Staff',
      }));
    }

    DB_STATE='live'; renderSyncBadge(); renderContent();
  } catch(e) {
    DB_STATE='error'; renderSyncBadge();
    console.warn('Sheets load error:', e.message);
  }
}

async function sheetPost(action, data) {
  if (!GAS_URL) return;
  SYNC_PENDING++; renderSyncBadge();
  try {
    const body = new URLSearchParams({action, data: JSON.stringify(data)});
    const r = await fetch(GAS_URL, {method:'POST', body});
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const d = await r.json();
    if (!d.ok) throw new Error(d.error || 'Write error');
    DB_STATE='live';
  } catch(e) {
    DB_STATE='error';
    console.warn('Sheets write error:', e.message);
  } finally {
    SYNC_PENDING = Math.max(0, SYNC_PENDING-1);
    renderSyncBadge();
  }
}

function renderSyncBadge() {
  const el = document.getElementById('sync-badge');
  if (!el) return;
  const badges = {
    offline: `<span id="sync-badge" style="font-size:11px;color:var(--muted);display:flex;align-items:center;gap:4px">${icon('link',11)} Offline</span>`,
    loading: `<span id="sync-badge" style="font-size:11px;color:var(--accent);display:flex;align-items:center;gap:4px">${icon('wifi',11)} Connecting…</span>`,
    live:    `<span id="sync-badge" style="font-size:11px;color:var(--success);display:flex;align-items:center;gap:4px">${icon('wifi',11)} ${SYNC_PENDING>0?'Syncing…':'Live'}</span>`,
    error:   `<span id="sync-badge" style="font-size:11px;color:var(--danger);display:flex;align-items:center;gap:4px">${icon('alert',11)} Sync error</span>`,
  };
  el.outerHTML = badges[DB_STATE] || badges.offline;
}

function tryLogin(email, pw){
  const e = email.toLowerCase().trim();

/* ── Aggregates ── */
const low=()=>products.filter(p=>p.stock<=p.low);
const stockUnits=()=>products.reduce((s,p)=>s+p.stock,0);
const costVal=()=>products.reduce((s,p)=>s+p.stock*p.cost,0);
const retailVal=()=>products.reduce((s,p)=>s+p.stock*p.price,0);
const salesOn=d=>sales.filter(s=>s.date===d);
const sumS=list=>list.reduce((a,s)=>({revenue:a.revenue+s.total,cost:a.cost+s.cost,profit:a.profit+s.profit,items:a.items+s.items.reduce((x,l)=>x+l.qty,0)}),{revenue:0,cost:0,profit:0,items:0});
const totExp=()=>expenses.reduce((s,e)=>s+e.amount,0);
function catStats(){
  return CATS.map(cat=>{
    const pp=products.filter(p=>p.category===cat);
    const su=pp.reduce((s,p)=>s+p.stock,0),sc=pp.reduce((s,p)=>s+p.stock*p.cost,0),sr=pp.reduce((s,p)=>s+p.stock*p.price,0);
    let us=0,rev=0,cst=0;
    sales.forEach(s=>s.items.forEach(l=>{if(l.category===cat){us+=l.qty;rev+=l.price*l.qty;cst+=l.cost*l.qty;}}));
    return{cat,count:pp.length,su,sc,sr,us,rev,cst,profit:rev-cst,margin:rev?(rev-cst)/rev*100:0};
  });
}
function topProds(n){
  const m={};
  sales.forEach(s=>s.items.forEach(l=>{if(!m[l.productId])m[l.productId]={name:l.name,qty:0,rev:0};m[l.productId].qty+=l.qty;m[l.productId].rev+=l.price*l.qty;}));
  return Object.values(m).sort((a,b)=>b.rev-a.rev).slice(0,n||5);
}

function getCustomers(){
  const map={};
  sales.forEach(s=>{
    if(!s.customer||!s.customer.trim()) return;
    const name=s.customer.trim();
    const key=name.toLowerCase();
    if(!map[key]) map[key]={name,totalSpent:0,visits:0,lastDate:'',firstDate:'',prods:{},sales:[]};
    map[key].totalSpent+=s.total;
    map[key].visits++;
    if(!map[key].lastDate||s.date>map[key].lastDate) map[key].lastDate=s.date;
    if(!map[key].firstDate||s.date<map[key].firstDate) map[key].firstDate=s.date;
    s.items.forEach(l=>{map[key].prods[l.name]=(map[key].prods[l.name]||0)+l.qty;});
    map[key].sales.push(s);
  });
  return Object.values(map).sort((a,b)=>b.totalSpent-a.totalSpent);
}
function topCustomerProduct(c){
  const entries=Object.entries(c.prods);
  if(!entries.length) return '—';
  return entries.sort((a,b)=>b[1]-a[1])[0][0];
}
function daysSince(dateStr){
  if(!dateStr) return null;
  const d=Math.floor((new Date()-new Date(dateStr+'T00:00'))/(864e5));
  if(d===0) return 'Today';
  if(d===1) return 'Yesterday';
  return d+' days ago';
}
function filteredSales(){
  return sales.filter(s=>{
    if(S.histFrom&&s.date<S.histFrom)return false;
    if(S.histTo&&s.date>S.histTo)return false;
    if(S.histCat!=="All"&&!s.items.some(l=>l.category===S.histCat))return false;
    if(S.histSearch&&!s.receipt.toLowerCase().includes(S.histSearch.toLowerCase()))return false;
    return true;
  }).sort((a,b)=>(b.date+b.time).localeCompare(a.date+a.time));
}
function filteredProds(){
  return products.filter(p=>{
    const ok=p.name.toLowerCase().includes(S.invSearch.toLowerCase())||p.sku.toLowerCase().includes(S.invSearch.toLowerCase());
    const oc=S.invCat==="All"||p.category===S.invCat;
    return ok&&oc;
  });
}

}

    const p=products.find(x=>x.id===r.productId);
    if(p) sub+=p.price*(r.qty||1);
  });
  const discountAmt=S.discount>0?Math.round(sub*S.discount/100):0;
  const grandTotal=Math.max(0,sub-discountAmt);

  function pickerFor(r){
    const p=products.find(x=>x.id===r.productId);
    const up=p?p.price:0,lt=up*(r.qty||1);
    if(r.productId&&!r.open)
      return`<div class="picker-selected">
        <span class="ps-name">${p.name}${p.subcategory?` <small style="color:var(--muted)">· ${p.subcategory}</small>`:''}</span>
        <span class="ps-price mono">${N(up)}</span>

      <input id="pk_${r.rowId}" class="picker-input"

                onfocus="_refreshCustSuggest(this.value)"

                style="padding:8px 11px;border:1px solid var(--line);border-radius:var(--r-sm);background:var(--paper);color:var(--ink);font-size:14px;width:170px"/>
              <div id="cust-suggest" style="display:none;position:absolute;top:calc(100% + 3px);left:0;right:0;background:var(--paper);border:1px solid var(--line);border-radius:var(--r-sm);box-shadow:var(--shadow-lg);z-index:60;max-height:180px;overflow-y:auto"></div>

          <div>

            <input type="number" inputmode="numeric" min="0" max="100"
              value="${S.discount||0}"
              oninput="S.discount=Math.min(100,Math.max(0,parseFloat(this.value)||0));_refreshSaleTotals()"

            <span style="color:var(--success)">Discount (${S.discount}%)</span>
            <span class="mono" id="sale-discount-amt" style="color:var(--success)">−${N(discountAmt)}</span>
          </div>
          <div class="pl-row total">
            <span>Total due</span>
            <span class="mono" id="sale-total" style="font-family:'Bodoni Moda',serif;font-size:20px">${N(grandTotal)}</span>
          </div>
        </div>
        <button id="sale-submit-btn" class="btn btn-primary"
          ${validRows().length===0?"disabled":""}
          onclick="completeSale()"
          style="min-width:140px;justify-content:center;padding:13px 18px">
          ${icon("check",14)} Record sale
        </button>
      </div>
    </div>`;

/* surgical updates — no full re-render needed */
function _refreshSaleTotals(){
  let sub=0;
  S.saleRows.forEach(r=>{const p=products.find(x=>x.id===r.productId);if(p)sub+=p.price*(r.qty||1);});
  const disc=S.discount>0?Math.round(sub*S.discount/100):0;
  const total=Math.max(0,sub-disc);
  const set=(id,v)=>{const el=document.getElementById(id);if(el)el.textContent=v;};
  const show=(id,v)=>{const el=document.getElementById(id);if(el)el.style.display=v;};
  set('sale-subtotal',N(sub));
  set('sale-total',N(total));
  set('sale-discount-amt','−'+N(disc));
  show('sale-discount-row',disc>0?'':'none');
  const btn=document.getElementById('sale-submit-btn');
  if(btn) btn.disabled=!S.saleRows.some(r=>r.productId);
}
function _refreshRowPrice(rowId){
  const r=S.saleRows.find(x=>x.rowId===rowId);
  const p=r&&products.find(x=>x.id===r.productId);
  const el=document.getElementById('rp_'+rowId);
  if(!el) return;
  if(p) el.innerHTML=`<div style="font-size:11px;color:var(--muted)">${N(p.price)} × ${r.qty||1}</div><div class="mono" style="font-size:15px;font-weight:700">${N(p.price*(r.qty||1))}</div>`;
  else el.innerHTML=`<div style="color:var(--muted);font-size:12px">—</div>`;
}

/* ─── Sales Rep Tracker ─── */
function getSalesRepStats(periodSales){
  const map={};
  periodSales.forEach(s=>{
    const name=s.staff||'Unknown';
    if(!map[name]) map[name]={name,revenue:0,profit:0,transactions:0,items:0,sales:[],hours:Array(24).fill(0)};
    map[name].revenue+=s.total;
    map[name].profit+=s.profit;
    map[name].transactions++;
    map[name].items+=s.items.reduce((a,l)=>a+l.qty,0);
    map[name].sales.push(s);
    const hr=parseInt((s.time||'00:00').split(':')[0])||0;
    map[name].hours[hr]++;
  });
  return Object.values(map).sort((a,b)=>b.revenue-a.revenue);
}
function repFilterSales(period){
  if(period==='today') return sales.filter(s=>s.date===TODAY);
  if(period==='week')  return sales.filter(s=>s.date>=dStr(6));
  if(period==='month') return sales.filter(s=>s.date>=dStr(29));
  return sales;
}

function renderRepDetail(name,period){
  const periodSales=repFilterSales(period);
  const reps=getSalesRepStats(periodSales);
  const r=reps.find(x=>x.name===name);
  if(!r) return`<div class="sheet-body"><p style="color:var(--muted)">No data found.</p></div>`;

  const avg=r.transactions>0?Math.round(r.revenue/r.transactions):0;
  const gm=r.revenue>0?r.profit/r.revenue*100:0;
  const totalTeamRev=reps.reduce((s,x)=>s+x.revenue,0);
  const share=totalTeamRev>0?r.revenue/totalTeamRev*100:0;
  const sortedSales=r.sales.slice().sort((a,b)=>(b.date+b.time).localeCompare(a.date+a.time));

  // Top products this rep sells
  const prodMap={};
  r.sales.forEach(s=>s.items.forEach(l=>{
    prodMap[l.name]=(prodMap[l.name]||{name:l.name,qty:0,rev:0});
    prodMap[l.name].qty+=l.qty; prodMap[l.name].rev+=l.price*l.qty;
  }));
  const topRepProds=Object.values(prodMap).sort((a,b)=>b.rev-a.rev).slice(0,5);

  // Peak hours mini chart
  const maxHr=Math.max(1,...r.hours);
  const activeHours=r.hours.map((v,i)=>({h:i,v})).filter(x=>x.v>0);

  const periodLabels={today:'Today',week:'Last 7 days',month:'Last 30 days',all:'All time'};

  return`
    <div class="sheet-handle"></div>
    <div class="sheet-head">
      <div>
        <h3>${r.name}</h3>
        <div style="font-size:11px;color:var(--muted);margin-top:2px">${periodLabels[period]||'All time'}</div>
      </div>
      <button class="icon-btn" onclick="closeModal()">${icon('x',13)}</button>
    </div>
    <div class="sheet-body" style="padding-bottom:30px">

      <!-- KPI grid -->
      <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:9px;margin-bottom:18px">
        ${[
          ['Revenue','var(--ink)',N(r.revenue)],
          ['Profit','var(--success)',N(r.profit)],
          ['Transactions','var(--ink)',r.transactions],
          ['Items sold','var(--ink)',r.items],
          ['Avg order','var(--ink)',N(avg)],
          ['Gross margin','var(--success)',Pct(gm)],
          ['Team share','var(--accent)',Pct(share)],
        ].map(([l,col,v])=>`
          <div style="background:var(--surface);border:1px solid var(--line);border-radius:var(--r-sm);padding:12px">
            <div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px">${l}</div>
            <div style="font-size:17px;font-weight:700;color:${col}">${v}</div>
          </div>`).join('')}
      </div>

      <!-- Peak hours -->
      ${activeHours.length>0?`
      <div style="margin-bottom:18px">
        <div style="font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);font-weight:700;margin-bottom:10px">Peak selling hours</div>
        <div style="display:flex;align-items:flex-end;gap:4px;height:60px;padding:0 2px">
          ${r.hours.map((v,h)=>`
            <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:3px">
              <div style="width:100%;background:${v===maxHr&&v>0?'var(--accent)':'var(--line)'};border-radius:3px 3px 0 0;height:${v>0?(v/maxHr*48).toFixed(0):2}px;transition:height .4s ease"></div>
              ${v>0?`<div style="font-size:8px;color:var(--muted)">${h}</div>`:'<div style="font-size:8px;color:transparent">0</div>'}
            </div>`).join('')}
        </div>
        <div style="font-size:11px;color:var(--muted);margin-top:6px;text-align:center">
          Peak: ${r.hours.indexOf(maxHr)}:00–${r.hours.indexOf(maxHr)+1}:00 (${maxHr} sales)
        </div>
      </div>`:''}

      <!-- Top products -->
      ${topRepProds.length>0?`
      <div style="margin-bottom:18px">
        <div style="font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);font-weight:700;margin-bottom:10px">Top products sold</div>
        ${topRepProds.map((p,i)=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--line);font-size:13px">
          <div style="display:flex;align-items:center;gap:9px">

            <div class="mono" style="font-weight:600">${N(p.rev)}</div>
            <div style="font-size:10.5px;color:var(--muted)">${p.qty} units</div>
          </div>
        </div>`).join('')}
      </div>`:''}

      <!-- Recent sales -->
      <div style="font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);font-weight:700;margin-bottom:10px">Recent sales (${sortedSales.length})</div>
      ${sortedSales.slice(0,10).map(s=>`
        <div style="padding:10px 0;border-bottom:1px solid var(--line);cursor:pointer;font-size:13px" onclick="S.modal={type:'receipt',sale:${JSON.stringify(s).replace(/`/g,"'")}};renderModal()">

              <div class="mono" style="font-weight:700">${N(s.total)}</div>
              <div style="font-size:10.5px;color:var(--accent)">View ${icon('chevron',10)}</div>
            </div>
          </div>
        </div>`).join('')}
      ${sortedSales.length>10?`<div style="text-align:center;padding:10px;font-size:12px;color:var(--muted)">Showing 10 of ${sortedSales.length} sales</div>`:''}
    </div>`;
}

function openCustomerDetail(encodedName){
  const name=decodeURIComponent(encodedName);
  S.modal={type:'customerDetail', name};
  renderModal();
}

          <div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px">Visits</div>
          <div style="font-family:'Bodoni Moda',serif;font-size:18px;font-weight:600">${c.visits}</div>
        </div>
        <div style="background:var(--surface);border:1px solid var(--line);border-radius:var(--r-sm);padding:12px;text-align:center">
          <div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px">Avg order</div>
          <div style="font-family:'Bodoni Moda',serif;font-size:18px;font-weight:600">${N(avg)}</div>

/* ─── Accounting ─── */
function renderAccounting(){
  const period = S.accPeriod||'all';
  function filterByPeriod(list){
    if(period==='today') return list.filter(s=>s.date===TODAY);
    if(period==='week')  return list.filter(s=>s.date>=dStr(6));
    if(period==='month') return list.filter(s=>s.date>=dStr(29));
    return list;
  }
  const filtered=filterByPeriod(sales);
  const all=sumS(filtered);
  const filtEx=period==='all'?expenses:expenses.filter(e=>{
    if(period==='today') return e.date===TODAY;
    if(period==='week')  return e.date>=dStr(6);
    if(period==='month') return e.date>=dStr(29);
    return true;
  });
  const ex=(filtEx.length===expenses.length?totExp():filtEx.reduce((s,e)=>s+e.amount,0)),net=all.profit-ex;
  const gm=all.revenue?all.profit/all.revenue*100:0;
  const nm=all.revenue?net/all.revenue*100:0;
  const days=Math.max(1,period==='today'?1:period==='week'?7:period==='month'?30:Math.max(1,sales.length>0?(new Date()-new Date(sales[0]?.date||TODAY))/(864e5)+1:1));
  const avgDaily=all.revenue/days;

  // Expense breakdown by category
  const expCats={};
  filtEx.forEach(e=>{expCats[e.category]=(expCats[e.category]||0)+e.amount;});
  const expCatMax=Math.max(1,...Object.values(expCats));

  // Best day
  const dayMap={};
  filtered.forEach(s=>{dayMap[s.date]=(dayMap[s.date]||0)+s.total;});
  const bestDay=Object.entries(dayMap).sort((a,b)=>b[1]-a[1])[0];

  const periods=[['today','Today'],['week','7 Days'],['month','30 Days'],['all','All time']];

  return`
    <!-- Period selector -->
    <div style="display:flex;gap:7px;margin-bottom:16px;flex-wrap:wrap">
      ${periods.map(([k,l])=>`<button class="chip ${(S.accPeriod||'all')===k?'active':''}" onclick="S.accPeriod='${k}';renderContent()">${l}</button>`).join('')}
    </div>

    <!-- KPI row -->
    <div class="kpi-grid" style="margin-bottom:16px">
      <div class="stat-card"><div class="stat-label">Revenue</div><div class="stat-value" style="margin-top:6px;font-size:17px">${N(all.revenue)}</div><div class="stat-sub">${N(Math.round(avgDaily))}/day avg</div></div>
      <div class="stat-card"><div class="stat-label">Cost of sales</div><div class="stat-value" style="margin-top:6px;font-size:17px">${N(all.cost)}</div><div class="stat-sub">${Pct(all.revenue?all.cost/all.revenue*100:0)} of revenue</div></div>
      <div class="stat-card"><div class="stat-label">Gross profit</div><div class="stat-value" style="margin-top:6px;font-size:17px;color:var(--success)">${N(all.profit)}</div><div class="stat-sub">${Pct(gm)} margin</div></div>
      <div class="stat-card"><div class="stat-label">Net profit</div><div class="stat-value" style="margin-top:6px;font-size:17px;color:${net>=0?"var(--success)":"var(--danger)"}">${N(net)}</div><div class="stat-sub">${Pct(nm)} margin</div></div>
    </div>

    <div class="two-col">
      <!-- P&L -->
      <div class="panel">
        <div class="panel-head"><h3>Profit &amp; Loss</h3><span style="font-size:10.5px;color:var(--muted)">${periods.find(p=>p[0]===(S.accPeriod||'all'))?.[1]||'All time'}</span></div>
        <div class="pl-block">
          <div class="pl-row"><span style="font-weight:600">Revenue</span><span class="mono" style="font-weight:600">${N(all.revenue)}</span></div>
          <div class="pl-row"><span style="color:var(--muted);padding-left:12px">Cost of goods sold</span><span class="mono neg">(${N(all.cost)})</span></div>
          <div class="pl-row" style="border-top:1px solid var(--line);padding-top:9px;margin-top:2px"><span style="font-weight:700">Gross profit</span><span class="mono" style="font-weight:700">${N(all.profit)} <small style="font-weight:400;color:var(--muted)">${Pct(gm)}</small></span></div>
          <div style="height:10px"></div>
          <div class="pl-row"><span style="color:var(--muted);padding-left:12px">Operating expenses</span><span class="mono neg">(${N(ex)})</span></div>
          <div class="pl-row total"><span>Net profit</span><span class="mono" style="color:${net>=0?"var(--success)":"var(--danger)"}">${N(net)} <small style="font-weight:400;color:var(--muted)">${Pct(nm)}</small></span></div>
        </div>
      </div>

      <!-- Inventory + quick stats -->
      <div>
        <div class="panel" style="margin-bottom:12px">
          <div class="panel-head"><h3>Inventory snapshot</h3></div>
          <div class="pl-block" style="padding:13px 17px">
            <div class="pl-row"><span>Units on hand</span><span class="mono">${stockUnits()}</span></div>
            <div class="pl-row"><span>Stock at cost</span><span class="mono">${N(costVal())}</span></div>
            <div class="pl-row"><span>Stock at retail</span><span class="mono">${N(retailVal())}</span></div>
            <div class="pl-row total"><span>Unrealised profit</span><span class="mono" style="color:var(--success)">${N(retailVal()-costVal())}</span></div>
          </div>
        </div>
        <div class="panel">
          <div class="panel-head"><h3>Quick stats</h3></div>
          <div class="pl-block" style="padding:13px 17px">
            <div class="pl-row"><span>Transactions</span><span class="mono">${filtered.length}</span></div>
            <div class="pl-row"><span>Items sold</span><span class="mono">${all.items}</span></div>
            <div class="pl-row"><span>Avg. sale value</span><span class="mono">${N(filtered.length?all.revenue/filtered.length:0)}</span></div>
            ${bestDay?`<div class="pl-row"><span>Best day</span><span class="mono">${fmt(bestDay[0])} <small style="color:var(--muted)">${N(bestDay[1])}</small></span></div>`:''}
          </div>
        </div>
      </div>
    </div>

    <!-- Expense breakdown -->
    <div class="panel">
      <div class="panel-head">
        <h3>Operating expenses</h3>
        <button class="btn btn-primary btn-sm" onclick="openModal('addExpense')">${icon("plus",12)} Add</button>
      </div>
      ${Object.keys(expCats).length>0?`
      <div style="padding:12px 17px;border-bottom:1px solid var(--line)">
        ${Object.entries(expCats).sort((a,b)=>b[1]-a[1]).map(([cat,amt])=>`
          <div class="bar-row" style="padding:7px 0">
            <div class="bar-lbl" style="font-size:12px">${cat}</div>
            <div class="bar-track"><div class="bar-fill" style="width:${(amt/expCatMax*100).toFixed(0)}%;background:var(--accent)"></div></div>
            <div class="bar-val">${N(amt)}</div>
          </div>`).join('')}
        <div style="display:flex;justify-content:space-between;padding-top:9px;margin-top:4px;border-top:1px dashed var(--line);font-weight:700;font-size:13px">
          <span>Total</span><span class="mono">${N(ex)}</span>
        </div>
      </div>`:''}
      <!-- Expense list -->
      <div class="table-wrap"><table><thead><tr><th>Date</th><th>Description</th><th>Category</th><th>Amount</th><th></th></tr></thead><tbody>
        ${filtEx.length===0?`<tr class="empty-row"><td colspan="5">No expenses recorded.</td></tr>`:
          filtEx.slice().sort((a,b)=>b.date.localeCompare(a.date)).map(e=>`<tr>
            <td class="mono">${fmt(e.date)}</td><td>${e.description}</td>
            <td style="color:var(--muted)">${e.category}</td>
            <td class="mono">${N(e.amount)}</td>
            <td><span class="icon-btn" onclick="delExpense('${e.id}')">${icon("trash",12)}</span></td>
          </tr>`).join("")}
      </tbody></table></div>
      <div class="data-cards" style="padding:12px">
        ${filtEx.length===0?`<div style="color:var(--muted);text-align:center;padding:16px;font-size:13px">No expenses recorded.</div>`:
          filtEx.slice().sort((a,b)=>b.date.localeCompare(a.date)).map(e=>`<div class="data-card">
            <div class="dc-row"><span class="dc-title">${e.description}</span><span class="mono" style="font-weight:700">${N(e.amount)}</span></div>
            <div class="dc-row"><span class="dc-meta">${fmt(e.date)} · ${e.category}</span>
              <button class="icon-btn" onclick="delExpense('${e.id}')">${icon("trash",12)}</button>
            </div>
          </div>`).join("")}
        ${filtEx.length>0?`<div style="display:flex;justify-content:space-between;padding:10px 0;border-top:1px solid var(--line);font-weight:700;font-size:13px"><span>Total</span><span class="mono">${N(ex)}</span></div>`:''}
      </div>
    </div>`;
}

/* ─── Reports & Analytics ─── */
function getLast7(){
  const days=[];
  for(let i=6;i>=0;i--){
    const d=dStr(i);
    const ds=salesOn(d),sm=sumS(ds);
    const label=i===0?"Today":i===1?"Yest":new Date(d+"T00:00").toLocaleDateString("en-GB",{weekday:"short"});
    days.push({date:d,label,revenue:sm.revenue,profit:sm.profit,count:ds.length});
  }
  return days;
}
function svgBars(days){
  const maxV=Math.max(...days.map(d=>d.revenue),1);
  const W=400,H=160,PB=24,PT=18,PL=4,PR=4;
  const n=days.length,slot=(W-PL-PR)/n;
  const barW=slot*0.55,gapW=(slot-barW)/2;
  const bars=days.map((d,i)=>{
    const x=PL+i*slot+gapW;
    const bh=Math.max(((d.revenue/maxV)*(H-PB-PT)),d.revenue>0?4:0);
    const y=H-PB-bh;
    const isToday=i===days.length-1;
    const label=d.count>0?abbreviate(d.revenue):"";
    return`
      <rect class="chart-bar" x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${barW.toFixed(1)}" height="${bh.toFixed(1)}"
        rx="3" fill="${isToday?"var(--accent)":"var(--line)"}" style="animation-delay:${(i*0.07).toFixed(2)}s"/>

function abbreviate(n){
  if(n>=1000000)return(n/1000000).toFixed(1)+"M";
  if(n>=1000)return(n/1000).toFixed(0)+"k";
  return String(Math.round(n));
}
function svgDonut(slices,size=130){
  const total=slices.reduce((s,sl)=>s+sl.value,0);
  if(!total)return`<svg viewBox="0 0 ${size} ${size}" style="width:${size}px;height:${size}px"><circle cx="${size/2}" cy="${size/2}" r="${size/2.8}" fill="none" stroke="var(--line)" stroke-width="${size/6}"/></svg>`;
  const cx=size/2,cy=size/2,r=size/2.8,sw=size/5.5;
  let a=-Math.PI/2;
  const paths=slices.map((sl,i)=>{
    const sweep=(sl.value/total)*2*Math.PI*(0.98);
    const x1=cx+r*Math.cos(a),y1=cy+r*Math.sin(a);
    a+=sweep+Math.PI*0.01;
    const x2=cx+r*Math.cos(a),y2=cy+r*Math.sin(a);
    const large=sweep>Math.PI?1:0;
    return`<path d="M${x1.toFixed(2)} ${y1.toFixed(2)} A${r} ${r} 0 ${large} 1 ${x2.toFixed(2)} ${y2.toFixed(2)}"
      fill="none" stroke="${sl.color}" stroke-width="${sw}" stroke-linecap="round"
      class="chart-area" style="animation-delay:${(i*0.1).toFixed(2)}s"/>`;
  }).join("");
  return`<svg viewBox="0 0 ${size} ${size}" style="width:${size}px;height:${size}px;display:block">${paths}</svg>`;
}

function _refreshPickerDrop(rowId){
  const row=S.saleRows.find(r=>r.rowId===rowId);
  const el=document.getElementById('pkd_'+rowId);
  if(!el||!row) return;
  if(!row.open){ if(el.style) el.style.display='none'; return; }
  const srch=(row.search||'').toLowerCase();
  const filtered=products.filter(px=>px.stock>0&&(
    px.name.toLowerCase().includes(srch)||
    px.sku.toLowerCase().includes(srch)||
    px.category.toLowerCase().includes(srch)||
    (px.subcategory||'').toLowerCase().includes(srch)
  )).slice(0,10);
  if(el.style) el.style.display='block';
  if(!filtered.length){
    el.innerHTML=`<div style="padding:13px;text-align:center;color:var(--muted);font-size:12.5px">${srch?`No results for "${row.search}"`:'No products in stock'}</div>`;
    return;
  }
  el.innerHTML=filtered.map(px=>`<div class="picker-item" onmousedown="selectFromPicker('${rowId}','${px.id}')">
    <div class="pi-name">${px.name}${px.subcategory?` <span style="font-size:10px;color:var(--muted)">· ${px.subcategory}</span>`:''}</div>
    <div class="pi-meta">${px.category} · <span class="pi-price">${N(px.price)}</span> · ${px.stock} left</div>
  </div>`).join('');
}
function selectFromPicker(rowId,productId){

}

/* ─── CSV Export ─── */
function dlCSV(filename, rows){
  const csv = rows.map(r => r.map(c => {
    const s = String(c===null||c===undefined?'':c);
    return s.includes(',') || s.includes('"') || s.includes('\n') ? `"${s.replace(/"/g,'""')}"` : s;
  }).join(',')).join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
  a.download = filename;
  a.click();
}
function exportInventoryCSV(){
  const isAdmin = S.role==="admin";
  const headers = isAdmin
    ? ['SKU','Name','Category','Cost','Price','Profit','Margin %','Stock','Low Alert','Status']
    : ['SKU','Name','Category','Price','Stock','Status'];
  const rows = products.map(p => {
    const mg = p.price?(p.price-p.cost)/p.price*100:0;
    const st = p.stock===0?'Out of stock':p.stock<=p.low?'Low stock':'In stock';
    return isAdmin
      ? [p.sku,p.name,p.category,p.cost,p.price,p.price-p.cost,mg.toFixed(1),p.stock,p.low,st]
      : [p.sku,p.name,p.category,p.price,p.stock,st];
  });
  dlCSV('8fifteen-inventory-'+TODAY+'.csv', [headers,...rows]);
  showToast('Inventory exported');
}
function exportSalesCSV(){
  const list = filteredSales();
  const isAdmin = S.role==="admin";
  const headers = isAdmin
    ? ['Receipt','Date','Time','Items','Payment','Staff','Revenue','Cost','Profit']

      : [s.receipt,s.date,s.time,qty,s.payment,s.staff,s.total];
  });
  dlCSV('8fifteen-sales-'+TODAY+'.csv', [headers,...rows]);
  showToast('Sales exported');
}

function refreshSubcatOptions(catName, selectedSub){
  const catData = CATS_DATA.find(c=>c.name===catName);
  const subs = catData?catData.subs:[];
  const sel = document.getElementById('f-subcat');
  if(!sel) return;
  sel.innerHTML = `<option value="">None</option>${subs.map(s=>`<option value="${s}" ${s===selectedSub?"selected":""}>${s}</option>`).join('')}`;
}

  return`<div class="sheet-handle"></div>
    <div class="sheet-head"><h3>Manage categories</h3><button class="icon-btn" onclick="closeModal()">${icon("x",13)}</button></div>
    <div class="sheet-body">
      ${CATS_DATA.map((cat,ci)=>`
        <div style="margin-bottom:14px;padding:13px;background:var(--surface);border-radius:var(--r-sm);border:1px solid var(--line)">

            <span style="font-weight:700;font-size:13.5px">${cat.name}</span>

          </div>
          <div style="font-size:11px;color:var(--muted);margin-bottom:6px">Sub-categories:</div>
          ${cat.subs.length===0?`<div style="font-size:12px;color:var(--muted);margin-bottom:8px">None added yet</div>`:`

          </div>`}
          <div style="display:flex;gap:7px">
            <input id="newsub_${ci}" placeholder="Add sub-category…" style="flex:1;padding:7px 10px;border:1px solid var(--line);border-radius:var(--r-sm);background:var(--paper);color:var(--ink);font-size:12.5px"/>
            <button class="btn btn-ghost btn-sm" onclick="addSubCat(${ci})">${icon("plus",11)}</button>

      <div style="border-top:1px solid var(--line);padding-top:14px;margin-top:4px">

        <div style="display:flex;gap:8px">
          <input id="newcat-name" placeholder="Category name" style="flex:1;padding:9px 10px;border:1px solid var(--line);border-radius:var(--r-sm);background:var(--paper);color:var(--ink);font-size:13px"/>
          <button class="btn btn-primary btn-sm" onclick="addCat()">${icon("plus",12)} Add</button>
        </div>
      </div>

    <div class="sheet-foot"><button class="btn btn-primary" onclick="closeModal()">${icon("check",13)} Done</button></div>`;
}
function addCat(){
  const name=(document.getElementById('newcat-name')?.value||'').trim();
  if(!name){alert('Enter a category name.');return;}
  if(CATS_DATA.find(c=>c.name.toLowerCase()===name.toLowerCase())){alert('Category already exists.');return;}
  const colors=['#9C7A3C','#6B7355','#8C5A46','#5B6B73','#6B5B73','#4E7373','#735B4E','#4E6173'];
  CATS_DATA.push({name,color:colors[CATS_DATA.length%colors.length],subs:[]});
  syncCats();
  openModal('manageCategories');
}
function deleteCat(ci){
  if(!confirm(`Delete "${CATS_DATA[ci].name}"? Products in this category will keep the name.`))return;
  CATS_DATA.splice(ci,1); syncCats(); openModal('manageCategories');
}
function addSubCat(ci){
  const el=document.getElementById('newsub_'+ci);
  const name=(el?.value||'').trim();
  if(!name){alert('Enter a sub-category name.');return;}
  if(CATS_DATA[ci].subs.includes(name)){alert('Sub-category already exists.');return;}
  CATS_DATA[ci].subs.push(name);
  openModal('manageCategories');
}
function deleteSub(ci,si){ CATS_DATA[ci].subs.splice(si,1); openModal('manageCategories'); }

function previewMargin(){
  const cost=parseFloat(document.getElementById("f-cost").value)||0;
  const price=parseFloat(document.getElementById("f-price").value)||0;
  const mg=price?(price-cost)/price*100:0;
  document.getElementById("margin-preview").innerHTML=`Profit: <b>${N(price-cost)}</b> &nbsp;·&nbsp; Margin: <b>${Pct(mg)}</b>`;
}

/* ─── Event handlers ─── */
function saveGasUrl(){
  const url = (document.getElementById('gas-url-input').value||'').trim();
  GAS_URL = url;
  localStorage.setItem('8fw_gas_url', url);
  if(url){ loadFromSheets(); } else { DB_STATE='offline'; render(); }
}
function disconnectSheets(){
  GAS_URL=''; localStorage.removeItem('8fw_gas_url'); DB_STATE='offline'; render();
}
async function testConnection(){
  if(!GAS_URL) return;
  DB_STATE='loading'; renderSyncBadge();
  try{
    const r = await fetch(`${GAS_URL}?action=ping`);
    const d = await r.json();
    if(!d.ok) throw new Error(d.error);
    DB_STATE='live'; renderSyncBadge(); showToast('Connected to Google Sheets ✓');
  }catch(e){ DB_STATE='error'; renderSyncBadge(); showToast('Connection failed: '+e.message); }
}
async function reloadFromSheets(){ await loadFromSheets(); renderContent(); showToast('Reloaded from Google Sheets'); }
async function seedSheetDemo(){
  await sheetPost('seedDemo',{}); await loadFromSheets();
  renderContent(); showToast('Demo products seeded to sheet');
}
function go(v){S.view=v;S.drawerOpen=false;render();}
function setRole(r){S.role=r;render();}
function openDrawer(){S.drawerOpen=true;render();}
function closeDrawer(){S.drawerOpen=false;render();}
function openMoreSheet(){S.modal={type:"moreNav"};renderModal();}
function openModal(t,id){S.modal={type:t,id};renderModal();}
function closeModal(){S.modal=null;renderModal();}

function addRow(){S.saleRows.push({rowId:uid("row"),productId:"",qty:1,search:"",open:false});renderContent();}
function removeRow(rowId){
  S.saleRows=S.saleRows.filter(r=>r.rowId!==rowId);
  if(!S.saleRows.length)S.saleRows.push({rowId:uid("row"),productId:"",qty:1,search:"",open:false});
  renderContent();
}
function setRP(rowId,pid){const r=S.saleRows.find(x=>x.rowId===rowId);if(r){r.productId=pid;r.qty=r.qty||1;}renderContent();}
function setRQ(rowId,v){
  const r=S.saleRows.find(x=>x.rowId===rowId);
  if(!r) return;
  r.qty=Math.max(1,parseInt(v)||1);
  _refreshRowPrice(rowId);
  _refreshSaleTotals();
}

function completeSale(){
  const valid=validRows();if(!valid.length){alert("Add at least one product.");return;}
  const agg={};valid.forEach(r=>{agg[r.productId]=(agg[r.productId]||0)+r.qty;});
  for(const pid in agg){const p=products.find(x=>x.id===pid);if(!p||agg[pid]>p.stock){alert(`${p?p.name:"Product"} only has ${p?p.stock:0} in stock.`);return;}}
  const items=Object.entries(agg).map(([pid,qty])=>{const p=products.find(x=>x.id===pid);return{productId:p.id,name:p.name,category:p.category,qty,price:p.price,cost:p.cost};});
  const subtotal=items.reduce((s,l)=>s+l.price*l.qty,0);
  const cost=items.reduce((s,l)=>s+l.cost*l.qty,0);
  const discountAmt=S.discount>0?Math.round(subtotal*S.discount/100):0;
  const total=Math.max(0,subtotal-discountAmt);
  const time=new Date().toTimeString().slice(0,5),rc="8FW-"+(rcCounter++);
  const staffName=S.currentUser?S.currentUser.name:"Staff";
  const saleRecord={id:uid("s"),receipt:rc,date:TODAY,time,items,payment:S.payment,
    staff:staffName,customer:S.customerName||'',total,cost,profit:total-cost,discount:S.discount||0};
  sales.push(saleRecord);
  products=products.map(p=>{const q=agg[p.id];return q?{...p,stock:p.stock-q}:p;});
  sheetPost('addSale',{...saleRecord,items:items.map(i=>({...i,id:uid('si'),saleId:saleRecord.id}))});
  Object.entries(agg).forEach(([pid,q])=>{const p=products.find(x=>x.id===pid);if(p)sheetPost('updateStock',{id:pid,stock:p.stock});});
  S.saleRows=[{rowId:uid("row"),productId:"",qty:1,search:"",open:false}];
  S.discount=0; S.customerName='';
  S.modal={type:"receipt",sale:saleRecord};
  renderContent();renderModal();
}

function _getSubcat(){
  const sel=(document.getElementById('f-subcat')?.value||'').trim();
  const nw=(document.getElementById('f-subcat-new')?.value||'').trim();
  const sub = nw||sel||'';
  // If typed a new sub, auto-add it to the category
  if(nw){
    const catName=document.getElementById('f-cat')?.value||'';
    const catD=CATS_DATA.find(c=>c.name===catName);
    if(catD&&!catD.subs.includes(nw)) catD.subs.push(nw);
  }
  return sub;
}
function saveAddProd(){
  const name=document.getElementById("f-name").value.trim();
  if(!name){alert("Name required.");return;}
  const sku=document.getElementById("f-sku").value.trim()||("GEN-"+Math.floor(Math.random()*900+100));
  const subcategory=_getSubcat();
  const p={id:uid("p"),sku,name,category:document.getElementById("f-cat").value,subcategory,
    cost:parseFloat(document.getElementById("f-cost").value)||0,
    price:parseFloat(document.getElementById("f-price").value)||0,
    stock:parseInt(document.getElementById("f-stock").value)||0,
    low:parseInt(document.getElementById("f-low").value)||5};
  products.push(p);
  sheetPost('addProduct', p);
  closeModal();renderContent();showToast(`${name} added`);
}
function saveEditProd(id){
  const idx=products.findIndex(p=>p.id===id);if(idx<0)return;
  const name=document.getElementById("f-name").value.trim();
  const subcategory=_getSubcat();
  const updated={...products[idx],name,sku:document.getElementById("f-sku").value.trim(),
    category:document.getElementById("f-cat").value,subcategory,
    cost:parseFloat(document.getElementById("f-cost").value)||0,
    price:parseFloat(document.getElementById("f-price").value)||0,
    stock:parseInt(document.getElementById("f-stock").value)||0,
    low:parseInt(document.getElementById("f-low").value)||5};
  products[idx]=updated;
  sheetPost('updateProduct', updated);
  closeModal();renderContent();showToast(`${name} updated`);
}
function delProduct(id){
  const p=products.find(x=>x.id===id);if(!p)return;
  if(!confirm(`Remove "${p.name}"?`))return;
  products=products.filter(x=>x.id!==id);
  sheetPost('deleteProduct',{id});
  renderContent();showToast(`${p.name} removed`);
}
function saveRestock(id){
  const p=products.find(x=>x.id===id);if(!p)return;
  const type=document.getElementById("f-adj-type").value;
  let qty=parseInt(document.getElementById("f-adj-qty").value)||0;
  const reason=document.getElementById("f-adj-reason").value.trim()||(type==="add"?"Restock":"Removed");
  if(qty<=0){alert("Enter a quantity > 0.");return;}
  if(type==="remove")qty=-qty;
  if(p.stock+qty<0){alert("Cannot remove more than current stock.");return;}
  p.stock+=qty;
  stockLog.push({name:p.name,qty,reason,time:new Date().toTimeString().slice(0,5)});
  sheetPost('updateStock',{id:p.id, stock:p.stock});
  sheetPost('logStock',{id:uid('sl'),productId:p.id,name:p.name,qty,reason,time:new Date().toTimeString().slice(0,5),date:TODAY});
  closeModal();renderContent();showToast(`${p.name}: stock now ${p.stock}`);
}
function saveExpense(){
  const desc=document.getElementById("f-exp-desc").value.trim();
  const amt=parseFloat(document.getElementById("f-exp-amt").value)||0;
  if(!desc||amt<=0){alert("Enter description and amount.");return;}
  const ex={id:"e"+(expCounter++),date:document.getElementById("f-exp-date").value||TODAY,
    description:desc,category:document.getElementById("f-exp-cat").value,amount:amt};
  expenses.push(ex);
  sheetPost('addExpense', ex);
  closeModal();renderContent();showToast("Expense recorded");
}
function delExpense(id){
  expenses=expenses.filter(e=>e.id!==id);
  sheetPost('deleteExpense',{id});
  renderContent();
}
function saveUser(){
  const name=document.getElementById("f-u-name").value.trim();
  const email=document.getElementById("f-u-email").value.trim();
  const role=document.getElementById("f-u-role").value;
  const pass=(document.getElementById("f-u-pass")?.value||"staff123").trim()||"staff123";
  if(!name||!email){alert("Name and email required.");return;}
  if(pass.length<6){alert("Password must be at least 6 characters.");return;}
  const u={id:uid("u"),name,email,role};
  users.push(u);
  STAFF_PASSWORDS[email.toLowerCase()]=pass;
  sheetPost('addUser', u);
  closeModal();renderContent();showToast(`${name} added · password set`);
}
function delUser(id){
  const u=users.find(x=>x.id===id);if(!u)return;
  if(!confirm(`Remove ${u.name}?`))return;
  users=users.filter(x=>x.id!==id);
  sheetPost('deleteUser',{id});
  renderContent();
}

applyTheme();
render(); // shows login screen since S.loggedIn is false
